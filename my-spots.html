<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>我的收藏</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Theme ── */
:root {
  --bg: #ffffff; --bg2: #f5f5f5; --bg3: #ebebeb;
  --card: #ffffff; --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
  --text: #111111; --text2: #555555; --text3: #999999;
  --accent: #111111; --accent2: #444444;
  --gold: #111111; --visited: #bbbbbb;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --radius: 12px;
}
[data-theme="dark"] {
  --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424;
  --card: #1a1a1a; --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.16);
  --text: #f0f0f0; --text2: #999999; --text3: #555555;
  --accent: #ffffff; --accent2: #cccccc;
  --gold: #ffffff; --visited: #555555;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.2s, color 0.2s; }

/* ── Header ── */
.hdr { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--bg); position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: var(--text); }
.logo small { color: var(--text3); font-size: 10px; font-family: 'Noto Sans TC', sans-serif; font-weight: 300; display: block; letter-spacing: 0.15em; }
.hdr-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.icon-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.2s; flex-shrink: 0; }
.icon-btn:hover { background: var(--bg3); color: var(--text); }
.cnt { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; white-space: nowrap; }

/* ── Search bar ── */
.search-wrap { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg); }
.search-inner { display: flex; align-items: center; gap: 8px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 10px; padding: 9px 14px; }
.search-inner svg { flex-shrink: 0; opacity: 0.4; }
.search-bar { flex: 1; background: none; border: none; outline: none; font-size: 14px; color: var(--text); font-family: 'Noto Sans TC', sans-serif; }
.search-bar::placeholder { color: var(--text3); }
.search-clear { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 0; display: none; }
.search-clear.show { display: block; }
.sort-sel { background: none; border: none; outline: none; font-size: 11px; color: var(--text3); cursor: pointer; font-family: 'Noto Sans TC', sans-serif; flex-shrink: 0; max-width: 72px; }

/* ── View tabs ── */
.view-tabs { padding: 10px 16px 0; display: flex; gap: 0; border-bottom: 1px solid var(--border); }
.view-tab { padding: 8px 16px; font-size: 12px; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; font-family: 'Noto Sans TC', sans-serif; }
.view-tab.on { color: var(--text); border-bottom-color: var(--text); }

/* ── Filters ── */
.filter-section { padding: 10px 16px; display: flex; gap: 6px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; align-items: center; flex-wrap: nowrap; }
.filter-section::-webkit-scrollbar { display: none; }
.ftag { flex-shrink: 0; padding: 5px 13px; border: 1px solid var(--border2); border-radius: 20px; background: transparent; font-size: 11px; color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
.ftag svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.ftag:hover { border-color: var(--text); color: var(--text); }
.ftag.on { background: var(--text); border-color: var(--text); color: var(--bg); }
.ftag-add { flex-shrink: 0; padding: 5px 11px; border: 1px dashed var(--border2); border-radius: 20px; background: transparent; font-size: 11px; color: var(--text3); cursor: pointer; white-space: nowrap; }
.ftag-add:hover { border-color: var(--text); color: var(--text); }

/* ── County filter bar ── */
.county-filter-section { padding: 8px 16px; display: flex; gap: 6px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; align-items: center; flex-wrap: nowrap; background: var(--bg2); }
.county-filter-section::-webkit-scrollbar { display: none; }
.county-ftag { flex-shrink: 0; padding: 4px 12px; border: 1px solid var(--border2); border-radius: 20px; background: var(--bg); font-size: 11px; color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.county-ftag:hover { border-color: var(--text); color: var(--text); }
.county-ftag.on { background: var(--text); border-color: var(--text); color: var(--bg); }

/* ── County view ── */
.county-section { padding: 16px; }
.county-group { margin-bottom: 20px; }
.county-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.county-count { font-size: 10px; color: var(--text3); font-weight: 300; }

/* ── Card grid ── */
.grid { padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; align-content: start; }

/* ── Card ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s; cursor: pointer; position: relative; }
.card:hover { border-color: var(--border2); box-shadow: var(--shadow); transform: translateY(-1px); }
.card.visited { background: #f0faf4; border-color: #b8e0c8; }
[data-theme="dark"] .card.visited { background: #0d1f14; border-color: #1e4d2e; }
.card.visited .card-name { color: var(--text2); }
.visited-stamp { position: absolute; top: 10px; right: 10px; background: #2ecc71; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
.visited-stamp svg { width: 12px; height: 12px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.fav-stamp { position: absolute; top: 10px; left: 10px; background: #e74c3c; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
.fav-stamp svg { width: 11px; height: 11px; stroke: #fff; fill: #fff; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.card.dragging { opacity: 0.4; transform: scale(0.97); }
.card.drag-over { border-color: var(--text); border-style: dashed; }
.card-img { width: 100%; height: 165px; object-fit: cover; display: block; background: var(--bg2); }
.card-ph { width: 100%; height: 165px; background: var(--bg2); display: flex; align-items: center; justify-content: center; }
.card-ph svg { width: 36px; height: 36px; stroke: var(--text3); fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
.card-body { padding: 14px; }
.card-top { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 6px; }
.card-name { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.3; flex: 1; }
.card-visited-badge { flex-shrink: 0; margin-top: 2px; }
.card-visited-badge svg { width: 16px; height: 16px; stroke: var(--text3); fill: none; stroke-width: 1.5; }
.card-cats { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 7px; }
.card-cat-tag { font-size: 10px; color: var(--text3); border: 1px solid var(--border2); border-radius: 10px; padding: 2px 8px; display: flex; align-items: center; gap: 3px; }
.card-cat-tag svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.card-addr { font-size: 11px; color: var(--text2); font-weight: 300; line-height: 1.5; margin-bottom: 10px; }
.card-note { font-size: 11px; color: var(--text2); font-style: italic; line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-foot { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.map-btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 6px; color: var(--text2); font-size: 10px; text-decoration: none; transition: all 0.15s; }
.map-btn:hover { border-color: var(--text); color: var(--text); }
.map-btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 1.5; }
.rating { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 3px; }
.card-menu { margin-left: auto; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 2px 4px; opacity: 0.5; }
.card-menu:hover { opacity: 1; }

/* ── Empty ── */
.empty { grid-column: 1/-1; text-align: center; padding: 72px 20px; }
.empty svg { width: 48px; height: 48px; stroke: var(--text3); fill: none; stroke-width: 1; margin-bottom: 16px; stroke-linecap: round; stroke-linejoin: round; }
.empty-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text2); margin-bottom: 8px; }
.empty-sub { font-size: 12px; color: var(--text3); line-height: 1.8; }

/* ── FAB ── */
.fab { position: fixed; bottom: 26px; right: 22px; width: 52px; height: 52px; border-radius: 50%; background: var(--text); color: var(--bg); border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 50; transition: transform 0.2s; }
.fab:hover { transform: scale(1.08); }
.fab:active { transform: scale(0.95); }

/* ── Overlay / Sheet ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.22s; }
.overlay.open { opacity: 1; pointer-events: all; }
.sheet { background: var(--bg); border: 1px solid var(--border2); border-radius: 22px 22px 0 0; width: 100%; max-width: 560px; padding: 24px 22px 44px; transform: translateY(30px); transition: transform 0.28s cubic-bezier(0.34,1.3,0.64,1); max-height: 92vh; overflow-y: auto; }
.overlay.open .sheet { transform: translateY(0); }
.handle { width: 34px; height: 3px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
.sheet-title { font-family: 'Playfair Display', serif; font-size: 19px; color: var(--text); margin-bottom: 4px; }
.sheet-sub { font-size: 12px; color: var(--text3); margin-bottom: 18px; line-height: 1.6; }

/* ── Form elements ── */
.field { margin-bottom: 12px; }
.field label { font-size: 10px; letter-spacing: 0.1em; color: var(--text3); display: block; margin-bottom: 5px; text-transform: uppercase; }
.input { width: 100%; padding: 12px 14px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 9px; color: var(--text); font-size: 13px; outline: none; font-family: 'Noto Sans TC', sans-serif; transition: border-color 0.2s; }
.input:focus { border-color: var(--text); }
.input::placeholder { color: var(--text3); }
textarea.input { resize: vertical; min-height: 72px; line-height: 1.6; }
.search-row { display: flex; gap: 8px; }
.search-row .input { flex: 1; }
.btn-search { padding: 12px 16px; background: var(--text); color: var(--bg); border: none; border-radius: 9px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; font-family: 'Noto Sans TC', sans-serif; transition: opacity 0.15s; }
.btn-search:hover { opacity: 0.8; }
.btn-search:disabled { opacity: 0.4; cursor: not-allowed; }

/* Cat multi-select in form */
.cat-picks { display: flex; gap: 5px; flex-wrap: wrap; }
.cat-pick { padding: 5px 12px; border: 1px solid var(--border2); border-radius: 20px; background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 4px; }
.cat-pick svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.cat-pick.on { background: var(--text); border-color: var(--text); color: var(--bg); }

/* Progress */
.prog { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; margin-bottom: 8px; }
.prog-fill { height: 100%; background: var(--text); border-radius: 1px; transition: width 0.4s ease; }
.status { font-size: 11px; color: var(--text2); text-align: center; min-height: 16px; margin-bottom: 10px; }
.status.err { color: #e05555; }

/* Results */
.results-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
.result-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 9px; cursor: pointer; transition: border-color 0.15s; }
.result-item:hover, .result-item.on { border-color: var(--text); }
.result-item-info { flex: 1; min-width: 0; }
.result-item-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.result-item-addr { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-item-rating { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* Selected preview */
.result-box { display: flex; gap: 12px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 10px; padding: 12px; margin-bottom: 12px; }
.result-thumb { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--bg3); }
.result-thumb-ph { width: 64px; height: 64px; border-radius: 8px; flex-shrink: 0; background: var(--bg3); display: flex; align-items: center; justify-content: center; }
.result-thumb-ph svg { width: 24px; height: 24px; stroke: var(--text3); fill: none; stroke-width: 1.2; }
.result-info { flex: 1; min-width: 0; }
.result-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.result-addr { font-size: 11px; color: var(--text2); line-height: 1.5; }
.result-rating { font-size: 11px; color: var(--text2); margin-top: 3px; }

/* Hint */
.hint { font-size: 11px; color: var(--text3); padding: 8px 12px; background: var(--bg2); border-radius: 7px; margin-bottom: 12px; line-height: 1.6; }

/* Actions */
.actions { display: flex; gap: 8px; margin-top: 4px; }
.btn-main { flex: 1; padding: 13px; background: var(--text); color: var(--bg); border: none; border-radius: 9px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: opacity 0.15s; }
.btn-main:hover { opacity: 0.85; }
.btn-main:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-sec { padding: 13px 18px; background: transparent; color: var(--text2); border: 1px solid var(--border2); border-radius: 9px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }

.detail-close { position: absolute; top: 16px; right: 16px; width: 30px; height: 30px; border-radius: 50%; background: var(--bg3); border: none; color: var(--text2); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; z-index: 10; }
.detail-close:hover { background: var(--border2); color: var(--text); }
.sheet { position: relative; }
.detail-img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 16px; background: var(--bg2); }
.detail-ph { width: 100%; height: 200px; background: var(--bg2); border-radius: 10px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; }
.detail-ph svg { width: 48px; height: 48px; stroke: var(--text3); fill: none; stroke-width: 1; }
.detail-ph { width: 100%; height: 200px; background: var(--bg2); border-radius: 10px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; }
.detail-ph svg { width: 48px; height: 48px; stroke: var(--text3); fill: none; stroke-width: 1; }
.detail-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.detail-cats { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.detail-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; font-size: 13px; color: var(--text2); line-height: 1.6; }
.detail-row svg { width: 15px; height: 15px; stroke: var(--text3); fill: none; stroke-width: 1.5; flex-shrink: 0; margin-top: 2px; stroke-linecap: round; stroke-linejoin: round; }
.detail-row a { color: var(--text); text-decoration: underline; word-break: break-all; }
.detail-note { background: var(--bg2); border-radius: 8px; padding: 12px; font-size: 13px; color: var(--text2); line-height: 1.7; font-style: italic; margin-bottom: 10px; }
.detail-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
.detail-btn { flex: 1; min-width: 120px; padding: 11px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 9px; font-size: 12px; color: var(--text2); cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px; }
.detail-btn:hover { border-color: var(--text); color: var(--text); }
.detail-btn.danger:hover { border-color: #e05555; color: #e05555; }
.detail-btn.visited-on { background: var(--text); color: var(--bg); border-color: var(--text); }
.detail-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/* Edit form in detail */
.edit-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }

/* Setup */
.setup-wrap { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 24px; }
.setup-box { max-width: 400px; width: 100%; }
.setup-box h2 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--text); margin-bottom: 8px; }
.setup-box p { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 24px; }
.setup-note { font-size: 11px; color: var(--text3); text-align: center; margin-top: 14px; line-height: 1.6; }

/* Context menu */
.ctx-menu { position: fixed; background: var(--bg); border: 1px solid var(--border2); border-radius: 10px; padding: 6px; z-index: 400; box-shadow: 0 8px 30px rgba(0,0,0,0.15); min-width: 150px; }
.ctx-item { padding: 10px 14px; font-size: 13px; color: var(--text2); cursor: pointer; border-radius: 6px; display: flex; align-items: center; gap: 8px; transition: background 0.1s; }
.ctx-item:hover { background: var(--bg2); color: var(--text); }
.ctx-item.danger:hover { color: #e05555; }
.ctx-item svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spin { display: inline-block; width: 11px; height: 11px; border: 1.5px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }

/* Custom cat modal */
.modal-sm { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 600; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-sm-box { background: var(--bg); border: 1px solid var(--border2); border-radius: 14px; padding: 24px; max-width: 340px; width: 100%; }
.modal-sm-box h3 { font-size: 16px; font-weight: 500; margin-bottom: 14px; color: var(--text); }

/* Deletable filter tag */
.ftag-del { margin-left: 3px; opacity: 0.5; font-size: 13px; line-height: 1; cursor: pointer; }
.ftag-del:hover { opacity: 1; }

/* Icon picker grid */
.icon-picker { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 14px; }
.icon-opt { width: 100%; aspect-ratio: 1; border: 1px solid var(--border2); border-radius: 8px; background: var(--bg2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.icon-opt:hover { border-color: var(--text); background: var(--bg3); }
.icon-opt.on { border-color: var(--text); background: var(--text); color: var(--bg); }
.icon-opt svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.ac-wrap { position: relative; flex: 1; }
.ac-list { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--bg); border: 1px solid var(--border2); border-radius: 10px; z-index: 300; box-shadow: 0 8px 24px rgba(0,0,0,0.12); overflow: hidden; max-height: 240px; overflow-y: auto; }
.ac-item { padding: 10px 14px; cursor: pointer; transition: background 0.1s; border-bottom: 1px solid var(--border); }
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.focused { background: var(--bg2); }
.ac-item-main { font-size: 13px; color: var(--text); font-weight: 500; }
.ac-item-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

@media (max-width: 480px) {
  .grid { grid-template-columns: 1fr; padding: 12px; }
  .hdr { padding: 13px 16px 11px; }
}
</style>
</head>
<body>

<!-- Setup -->
<div class="setup-wrap" id="setupWrap" style="display:none">
  <div class="setup-box">
    <h2>我的收藏</h2>
    <p>填入 Google Places API Key 開始使用。用於搜尋店家地址、評分與照片，Key 只存在你的瀏覽器。</p>
    <label style="font-size:10px;letter-spacing:0.1em;color:var(--text3);display:block;margin-bottom:6px;text-transform:uppercase">Google Places API Key</label>
    <input class="input" type="password" id="keyInput" placeholder="AIza..." style="margin-bottom:12px" />
    <button class="btn-main" style="width:100%" onclick="saveKey()">開始使用</button>
    <div class="setup-note">個人使用每月免費 10,000 次</div>
  </div>
</div>

<!-- Header -->
<header class="hdr">
  <div class="logo">我的收藏 <small>MY SPOTS</small></div>
  <div class="hdr-actions">
    <span class="cnt" id="cnt"></span>
    <button class="icon-btn" onclick="toggleTheme()" title="切換主題" id="themeBtn">☀</button>
    <button class="icon-btn" onclick="exportData()" title="匯出資料">
      <svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="document.getElementById('importInput').click()" title="匯入資料">
      <svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 8 12 3 17 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </button>
    <input type="file" id="importInput" accept=".json" style="display:none" onchange="handleImport(event)" />
    <button class="icon-btn" onclick="openSettings()" title="設定">
      <svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</header>

<!-- Search -->
<div class="search-wrap">
  <div class="search-inner">
    <svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-bar" id="searchBar" placeholder="搜尋收藏的地點..." oninput="onSearch()" />
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    <select class="sort-sel" id="sortSel" onchange="setSort(this.value)" title="排序">
      <option value="manual">手動</option>
      <option value="newest">最新</option>
      <option value="oldest">最早</option>
    </select>
  </div>
</div>

<!-- View tabs -->
<div class="view-tabs">
  <button class="view-tab on" onclick="setView('all',this)">全部</button>
  <button class="view-tab" onclick="setView('county',this)">縣市</button>
  <button class="view-tab" onclick="setView('fav',this)">精選</button>
  <button class="view-tab" onclick="setView('visited',this)">已去過</button>
</div>

<!-- Filter bar -->
<div class="filter-section" id="filterSection"></div>

<!-- County filter bar (only shown in county view) -->
<div class="county-filter-section" id="countyFilterSection" style="display:none"></div>

<!-- Main content -->
<div id="mainContent"></div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()">＋</button>

<!-- Add Modal -->
<div class="overlay" id="addOverlay" onclick="handleOverlay(event,'addOverlay')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">新增收藏地點</div>
    <div class="sheet-sub">輸入店名搜尋，或直接手動填寫。</div>

    <div class="field">
      <label>搜尋店名</label>
      <div class="search-row">
        <div class="ac-wrap">
          <input class="input" id="addSearch" type="text" placeholder="例如：三時珈琲 桃園" autocomplete="off"
            oninput="onAcInput()" onkeydown="onAcKey(event)" onblur="setTimeout(hideAc,150)" />
          <div class="ac-list" id="acList" style="display:none"></div>
        </div>
        <button class="btn-search" id="addSearchBtn" onclick="doSearch()">搜尋</button>
      </div>
    </div>
    <div class="hint">💡 加上城市更精準，例如「% Arabica 台北」</div>

    <div class="prog" id="addProg" style="display:none"><div class="prog-fill" id="addProgFill" style="width:0%"></div></div>
    <div class="status" id="addStatus"></div>
    <div class="results-list" id="addResults"></div>

    <div class="result-box" id="addPreview" style="display:none">
      <div id="addThumbWrap"></div>
      <div class="result-info">
        <div class="result-name" id="addPreviewName"></div>
        <div class="result-addr" id="addPreviewAddr"></div>
        <div class="result-rating" id="addPreviewRating"></div>
      </div>
    </div>

    <div class="field">
      <label>分類（可多選）</label>
      <div class="cat-picks" id="addCatPicks"></div>
    </div>

    <div class="field">
      <label>縣市</label>
      <select class="input" id="addCounty">
        <option value="">自動偵測 / 不指定</option>
        <option>台北市</option><option>新北市</option><option>桃園市</option>
        <option>台中市</option><option>台南市</option><option>高雄市</option>
        <option>基隆市</option><option>新竹市</option><option>新竹縣</option>
        <option>苗栗縣</option><option>彰化縣</option><option>南投縣</option>
        <option>雲林縣</option><option>嘉義市</option><option>嘉義縣</option>
        <option>屏東縣</option><option>宜蘭縣</option><option>花蓮縣</option>
        <option>台東縣</option><option>澎湖縣</option><option>金門縣</option>
        <option>連江縣</option><option>日本</option><option>韓國</option>
        <option>其他國家</option>
      </select>
    </div>

    <div class="field">
      <label>IG / Threads 貼文連結（選填）</label>
      <input class="input" id="addLink" type="url" placeholder="https://www.threads.net/..." />
    </div>

    <div class="field">
      <label>備註（選填）</label>
      <textarea class="input" id="addNote" placeholder="推薦理由、必點餐點、注意事項..."></textarea>
    </div>

    <div class="actions">
      <button class="btn-sec" onclick="closeOverlay('addOverlay')">取消</button>
      <button class="btn-main" id="addBtn" onclick="confirmAdd()" disabled>加入收藏</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="detailOverlay" onclick="handleOverlay(event,'detailOverlay')">
  <div class="sheet" id="detailSheet"></div>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctxMenu" style="display:none"></div>

<!-- Custom cat modal -->
<div class="modal-sm" id="catModal" style="display:none">
  <div class="modal-sm-box">
    <h3>新增自訂分類</h3>
    <label style="font-size:10px;letter-spacing:0.1em;color:var(--text3);display:block;margin-bottom:6px;text-transform:uppercase">分類名稱</label>
    <input class="input" id="catModalInput" placeholder="例如：夜市、甜點、海鮮..." style="margin-bottom:14px" onkeydown="if(event.key==='Enter')saveCustomCat()" />
    <label style="font-size:10px;letter-spacing:0.1em;color:var(--text3);display:block;margin-bottom:8px;text-transform:uppercase">選擇圖示</label>
    <div class="icon-picker" id="iconPicker"></div>
    <div class="actions">
      <button class="btn-sec" onclick="document.getElementById('catModal').style.display='none'">取消</button>
      <button class="btn-main" onclick="saveCustomCat()">新增</button>
    </div>
  </div>
</div>

<script>
// ── SVG Icons ──────────────────────────────────────────────────────────────
const SVG = {

  pin:      `<svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
  // 分類 icons（選擇器用）
  cutlery:  `<svg viewBox="0 0 24 24"><line x1="8" y1="2" x2="8" y2="10"/><path d="M5 2v4a3 3 0 0 0 6 0V2"/><line x1="8" y1="13" x2="8" y2="22"/><line x1="16" y1="2" x2="16" y2="22"/></svg>`,
  coffee:   `<svg viewBox="0 0 24 24"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/></svg>`,
  home:     `<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  mountain: `<svg viewBox="0 0 24 24"><polygon points="3 17 9 7 12 11 15 8 21 17"/><line x1="3" y1="20" x2="21" y2="20"/></svg>`,

  shopping: `<svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>`,
  sun:      `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`,
  camera:   `<svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`,
  cake:     `<svg viewBox="0 0 24 24"><path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8"/><path d="M4 16s.5-1 2-1 2.5 2 4 2 2.5-2 4-2 2 1 2 1"/><line x1="2" y1="21" x2="22" y2="21"/><path d="M7 8v2"/><path d="M12 8v2"/><path d="M17 8v2"/><path d="M7 4h.01"/><path d="M12 4h.01"/><path d="M17 4h.01"/></svg>`,

  flower:   `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.5"/><ellipse cx="12" cy="5.5" rx="2" ry="3"/><ellipse cx="12" cy="18.5" rx="2" ry="3"/><ellipse cx="5.5" cy="12" rx="3" ry="2"/><ellipse cx="18.5" cy="12" rx="3" ry="2"/><ellipse cx="7.4" cy="7.4" rx="2" ry="3" transform="rotate(45 7.4 7.4)"/><ellipse cx="16.6" cy="16.6" rx="2" ry="3" transform="rotate(45 16.6 16.6)"/><ellipse cx="16.6" cy="7.4" rx="2" ry="3" transform="rotate(-45 16.6 7.4)"/><ellipse cx="7.4" cy="16.6" rx="2" ry="3" transform="rotate(-45 7.4 16.6)"/></svg>`,
  cat:      `<svg viewBox="0 0 24 24"><path d="M5 17V10a7 7 0 0 1 14 0v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2z"/><path d="M5 10 3 5l4 3"/><path d="M19 10l2-5-4 3"/><circle cx="9" cy="13" r="1.2"/><circle cx="15" cy="13" r="1.2"/><path d="M10 17q2 1.5 4 0"/></svg>`,
};

const DEFAULT_CATS = [
  { id: 'food',        name: '餐廳',   icon: 'cutlery' },
  { id: 'coffee',      name: '咖啡廳', icon: 'coffee' },
  { id: 'stay',        name: '民宿',   icon: 'home' },
  { id: 'scene',       name: '景點',   icon: 'mountain' },
  { id: 'pet',         name: '寵物友善', icon: 'dog' },
  { id: 'notimelimit', name: '不限時', icon: 'laptop' },
];

// ── State ──────────────────────────────────────────────────────────────────
let spots = JSON.parse(localStorage.getItem('myspots_v4') || '[]');
let customCats = JSON.parse(localStorage.getItem('myspots_cats') || '[]');
let theme = localStorage.getItem('myspots_theme') || 'light';
let currentView = 'all';
let currentFilters = [];
let countyFilter = '';
let sortOrder = 'manual';
let searchQuery = '';
let pendingSpot = null;
let dragSrcId = null;
let editingSpotId = null;
let addSelectedCats = [];

function allCats() { return [...DEFAULT_CATS, ...customCats]; }
function save() { localStorage.setItem('myspots_v4', JSON.stringify(spots)); }
function saveCats() { localStorage.setItem('myspots_cats', JSON.stringify(customCats)); }
function getKey() { return localStorage.getItem('gplaceskey') || ''; }

// ── Theme ──────────────────────────────────────────────────────────────────
function applyTheme() {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀' : '🌙';
  localStorage.setItem('myspots_theme', theme);
}
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme();
}

// ── Setup ──────────────────────────────────────────────────────────────────
function checkSetup() {
  document.getElementById('setupWrap').style.display = getKey() ? 'none' : 'flex';
}
function saveKey() {
  const k = document.getElementById('keyInput').value.trim();
  if (!k) return;
  localStorage.setItem('gplaceskey', k);
  document.getElementById('setupWrap').style.display = 'none';
}
function openSettings() {
  document.getElementById('keyInput').value = getKey();
  document.getElementById('setupWrap').style.display = 'flex';
}

// ── Cat icon SVG ───────────────────────────────────────────────────────────
function catIconSVG(cat, size = 13) {
  const icon = SVG[cat.icon] || SVG.pin;
  return icon.replace('<svg', `<svg width="${size}" height="${size}" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"`);
}

// ── Filter bar ─────────────────────────────────────────────────────────────
function renderFilters() {
  const sec = document.getElementById('filterSection');
  const cats = allCats();
  sec.innerHTML = cats.map(c => {
    const isCustom = customCats.find(x => x.id === c.id);
    return `<button class="ftag ${currentFilters.includes(c.id) ? 'on' : ''}" onclick="toggleFilter('${c.id}')">
      ${catIconSVG(c)} ${c.name}
      ${isCustom ? `<span class="ftag-del" onclick="event.stopPropagation();deleteCustomCat('${c.id}')" title="刪除分類">×</span>` : ''}
    </button>`;
  }).join('') +
    `<button class="ftag-add" onclick="openCatModal()">＋ 新增分類</button>`;
}

function toggleFilter(id) {
  if (currentFilters.includes(id)) currentFilters = currentFilters.filter(f => f !== id);
  else currentFilters.push(id);
  renderFilters();
  renderMain();
}

// ── Main render ────────────────────────────────────────────────────────────
function getFilteredSpots() {
  let list = [...spots];
  if (currentView === 'visited') list = list.filter(s => s.visited);
  if (currentView === 'fav') list = list.filter(s => s.favourited);
  if (currentFilters.length) list = list.filter(s => s.categories?.some(c => currentFilters.includes(c)));
  if (countyFilter) list = list.filter(s => s.county === countyFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(s =>
      s.name?.toLowerCase().includes(q) ||
      s.address?.toLowerCase().includes(q) ||
      s.county?.toLowerCase().includes(q) ||
      s.note?.toLowerCase().includes(q)
    );
  }
  if (sortOrder === 'newest') list.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
  if (sortOrder === 'oldest') list.sort((a, b) => (a.createdAt || '').localeCompare(b.createdAt || ''));
  return list;
}

function renderMain() {
  const content = document.getElementById('mainContent');
  document.getElementById('cnt').textContent = spots.length + ' 個地點';
  renderCountyFilters();

  if (currentView === 'county') {
    renderCountyView(content);
  } else {
    content.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'grid';
    const list = getFilteredSpots();
    if (!list.length) {
      grid.innerHTML = `<div class="empty">
        ${SVG.map.replace('<svg', '<svg width="48" height="48" stroke="var(--text3)" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"')}
        <div class="empty-title">${spots.length === 0 ? '還沒有收藏' : '沒有符合的地點'}</div>
        <div class="empty-sub">${spots.length === 0 ? '點右下角 ＋ 開始收藏吧！' : ''}</div>
      </div>`;
    } else {
      list.forEach(s => grid.appendChild(makeCard(s)));
    }
    content.appendChild(grid);
  }
}

function renderCountyView(content) {
  const list = getFilteredSpots();
  const groups = {};
  list.forEach(s => {
    const key = s.county || '未分縣市';
    if (!groups[key]) groups[key] = [];
    groups[key].push(s);
  });

  content.innerHTML = '';
  if (!Object.keys(groups).length) {
    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.innerHTML = `<div class="empty">
      ${SVG.map.replace('<svg', '<svg width="48" height="48" stroke="var(--text3)" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"')}
      <div class="empty-title">沒有符合的地點</div>
    </div>`;
    content.appendChild(grid);
    return;
  }

  const sec = document.createElement('div');
  sec.className = 'county-section';
  Object.entries(groups).sort().forEach(([county, items]) => {
    const group = document.createElement('div');
    group.className = 'county-group';
    group.innerHTML = `<div class="county-title">${county} <span class="county-count">${items.length} 個地點</span></div>`;
    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.style.padding = '0';
    grid.style.marginTop = '8px';
    items.forEach(s => grid.appendChild(makeCard(s)));
    group.appendChild(grid);
    sec.appendChild(group);
  });
  content.appendChild(sec);
}

function makeCard(s) {
  const card = document.createElement('div');
  card.className = 'card' + (s.visited ? ' visited' : '');
  card.dataset.id = s.id;
  card.draggable = true;

  const cats = (s.categories || []).map(cid => {
    const cat = allCats().find(c => c.id === cid);
    return cat ? `<span class="card-cat-tag">${catIconSVG(cat, 10)} ${cat.name}</span>` : '';
  }).join('');

  card.innerHTML = `
    ${s.visited ? `<div class="visited-stamp"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>` : ''}
    ${s.favourited ? `<div class="fav-stamp"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>` : ''}
    ${s.photoUrl ? `<img class="card-img" src="${s.photoUrl}" loading="lazy" onerror="this.style.display='none'">` :
      `<div class="card-ph">${SVG.pin.replace('<svg', '<svg width="36" height="36" stroke="var(--text3)" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"')}</div>`}
    <div class="card-body">
      <div class="card-top">
        <div class="card-name">${s.name}</div>
      </div>
      ${cats ? `<div class="card-cats">${cats}</div>` : ''}
      ${s.address ? `<div class="card-addr">${s.address}</div>` : ''}
      ${s.note ? `<div class="card-note">${s.note}</div>` : ''}
      <div class="card-foot">
        ${s.mapsUrl ? `<a class="map-btn" href="${s.mapsUrl}" target="_blank" onclick="event.stopPropagation()">
          ${SVG.pin.replace('<svg', '<svg width="11" height="11" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"')} Google Maps
        </a>` : ''}
        ${s.rating ? `<span class="rating">${SVG.star.replace('<svg', '<svg width="11" height="11" stroke="currentColor" fill="currentColor" stroke-width="1.5"')} ${s.rating}</span>` : ''}
        <button class="card-menu" onclick="event.stopPropagation();showCtx(event,'${s.id}')">⋯</button>
      </div>
    </div>`;

  card.onclick = () => openDetail(s.id);
  card.addEventListener('dragstart', e => { dragSrcId = s.id; card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));
  card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
  card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
  card.addEventListener('drop', e => {
    e.preventDefault(); card.classList.remove('drag-over');
    if (dragSrcId && dragSrcId !== s.id) {
      const from = spots.findIndex(x => x.id === dragSrcId);
      const to = spots.findIndex(x => x.id === s.id);
      if (from !== -1 && to !== -1) {
        const [item] = spots.splice(from, 1);
        spots.splice(to, 0, item);
        save(); renderMain();
      }
    }
  });
  return card;
}

}
function toggleDetailCat(id) {

function saveDetail(id) {

}

// ── Autocomplete ───────────────────────────────────────────────────────────
let acTimer = null;
let acFocusIdx = -1;
let acSuggestions = [];

function onAcInput() {
  const q = document.getElementById('addSearch').value.trim();
  clearTimeout(acTimer);
  acFocusIdx = -1;
  if (q.length < 2) { hideAc(); return; }
  acTimer = setTimeout(() => fetchAc(q), 280);
}

async function fetchAc(q) {
  const key = getKey();
  if (!key) return;
  try {
    const res = await fetch('https://places.googleapis.com/v1/places:autocomplete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Goog-Api-Key': key },
      body: JSON.stringify({ input: q, languageCode: 'zh-TW', includedPrimaryTypes: [] })
    });
    if (!res.ok) return;
    const data = await res.json();
    // 只取 placePrediction（排除 queryPrediction）
    acSuggestions = (data.suggestions || []).filter(s => s.placePrediction);
    renderAc();
  } catch(e) {}
}

function renderAc() {
  const list = document.getElementById('acList');
  if (!acSuggestions.length) { hideAc(); return; }
  list.innerHTML = acSuggestions.slice(0, 6).map((s, i) => {
    const p = s.placePrediction;
    const main = p?.structuredFormat?.mainText?.text || p?.text?.text || '';
    const sub = p?.structuredFormat?.secondaryText?.text || '';
    return `<div class="ac-item" data-idx="${i}" onmousedown="selectAc(${i})">
      <div class="ac-item-main">${main}</div>
      ${sub ? `<div class="ac-item-sub">${sub}</div>` : ''}
    </div>`;
  }).join('');
  list.style.display = 'block';
}

function hideAc() {
  document.getElementById('acList').style.display = 'none';
  acSuggestions = [];
}

function selectAc(i) {
  const s = acSuggestions[i];
  if (!s) return;
  const p = s.placePrediction;
  const name = p?.structuredFormat?.mainText?.text || p?.text?.text || '';
  document.getElementById('addSearch').value = name;
  hideAc();
  doSearch();
}

function onAcKey(e) {
  const list = document.getElementById('acList');
  const items = list.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acFocusIdx = Math.min(acFocusIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('focused', i === acFocusIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acFocusIdx = Math.max(acFocusIdx - 1, -1);
    items.forEach((el, i) => el.classList.toggle('focused', i === acFocusIdx));
  } else if (e.key === 'Enter') {
    if (acFocusIdx >= 0 && acSuggestions[acFocusIdx]) {
      e.preventDefault();
      selectAc(acFocusIdx);
    } else {
      hideAc();
      doSearch();
    }
  } else if (e.key === 'Escape') {
    hideAc();
  }
}

async function doSearch() {
  const q = document.getElementById('addSearch').value.trim();
  if (!q) { setAddProgress(0, '請輸入店名', true); return; }
  const key = getKey();
  if (!key) { openSettings(); return; }
  document.getElementById('addSearchBtn').disabled = true;
  document.getElementById('addResults').innerHTML = '';
  document.getElementById('addPreview').style.display = 'none';
  document.getElementById('addBtn').disabled = true;
  pendingSpot = null;
  setAddProgress(30, '🔍 搜尋中...');
  try {
    const res = await fetch('https://places.googleapis.com/v1/places:searchText', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Goog-Api-Key': key, 'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.rating,places.photos,places.googleMapsUri,places.id,places.types' },
      body: JSON.stringify({ textQuery: q, languageCode: 'zh-TW', pageSize: 5 })
    });
    if (!res.ok) throw new Error((await res.json()).error?.message || 'API 錯誤');
    const data = await res.json();
    const places = data.places || [];
    if (!places.length) { setAddProgress(0, `找不到「${q}」，試試加上城市名`, true); return; }
    setAddProgress(100, `找到 ${places.length} 個結果，請選擇`);
    window._searchResults = places;
    document.getElementById('addResults').innerHTML = places.map((p, i) => `
      <div class="result-item" onclick="selectSearchResult(${i})" data-idx="${i}">
        <div class="result-item-info">
          <div class="result-item-name">${p.displayName?.text || ''}</div>
          <div class="result-item-addr">${p.formattedAddress || ''}</div>
          ${p.rating ? `<div class="result-item-rating">★ ${p.rating}</div>` : ''}
        </div>
      </div>`).join('');
  } catch(e) {
    setAddProgress(0, '⚠ ' + e.message, true);
  } finally {
    document.getElementById('addSearchBtn').disabled = false;
  }
}

async function selectSearchResult(i) {
  const place = window._searchResults?.[i];
  if (!place) return;
  const key = getKey();
  document.querySelectorAll('.result-item').forEach((el, idx) => el.classList.toggle('on', idx === i));
  setAddProgress(80, '📸 取得照片...');
  let photoUrl = null;
  if (place.photos?.length) photoUrl = `https://places.googleapis.com/v1/${place.photos[0].name}/media?maxHeightPx=400&maxWidthPx=600&key=${key}`;

  // Auto detect county from address (supports both 台 and 臺 variants)
  let county = '';
  const addr = place.formattedAddress || '';
  const countyMap = [
    ['台北市','臺北市'],['新北市'],['桃園市'],['台中市','臺中市'],
    ['台南市','臺南市'],['高雄市'],['基隆市'],['新竹市'],['新竹縣'],
    ['苗栗縣'],['彰化縣'],['南投縣'],['雲林縣'],['嘉義市'],['嘉義縣'],
    ['屏東縣'],['宜蘭縣'],['花蓮縣'],['台東縣','臺東縣'],['澎湖縣'],
    ['金門縣'],['連江縣']
  ];
  for (const variants of countyMap) {
    if (variants.some(v => addr.includes(v))) { county = variants[0]; break; }
  }
  if (!county && !addr.includes('台灣') && !addr.includes('臺灣') && addr.length > 0) county = '其他國家';

  // Auto-detect category from Google Place types
  const types = place.types || [];
  let autoCat = null;
  if (types.includes('cafe')) autoCat = 'coffee';
  else if (types.some(t => ['restaurant','food','meal_takeaway','meal_delivery','bakery','bar'].includes(t))) autoCat = 'food';
  else if (types.includes('lodging')) autoCat = 'stay';
  else if (types.some(t => ['tourist_attraction','park','natural_feature','museum','amusement_park','zoo','campground'].includes(t))) autoCat = 'scene';
  if (autoCat) { addSelectedCats = [autoCat]; renderAddCats(); }

  setAddProgress(100, '✓ 確認後加入收藏');
  pendingSpot = { id: Date.now().toString(), name: place.displayName?.text || '', address: addr, county, rating: place.rating || null, mapsUrl: place.googleMapsUri || '', photoUrl, createdAt: new Date().toISOString() };

  const tw = document.getElementById('addThumbWrap');
  tw.innerHTML = photoUrl ? `<img class="result-thumb" src="${photoUrl}" onerror="this.style.display='none'">` :
    `<div class="result-thumb-ph">${SVG.pin.replace('<svg', '<svg width="24" height="24" stroke="var(--text3)" fill="none" stroke-width="1.2"')}</div>`;
  document.getElementById('addPreviewName').textContent = pendingSpot.name;
  document.getElementById('addPreviewAddr').textContent = pendingSpot.address;
  document.getElementById('addPreviewRating').textContent = pendingSpot.rating ? `★ ${pendingSpot.rating}` : '';
  document.getElementById('addPreview').style.display = 'flex';
  document.getElementById('addBtn').disabled = false;

  // Set county dropdown
  if (county) document.getElementById('addCounty').value = county;
}

function confirmAdd() {
  if (!pendingSpot) return;
  const county = document.getElementById('addCounty').value || pendingSpot.county || '';
  spots.unshift({ ...pendingSpot, categories: [...addSelectedCats], county, sourceUrl: document.getElementById('addLink').value.trim(), note: document.getElementById('addNote').value.trim(), visited: false });
  save(); renderMain();
  closeOverlay('addOverlay');
}

// ── Custom cat ─────────────────────────────────────────────────────────────
const ICON_OPTS = [
  'cutlery','coffee','home','mountain','pin','dog',
  'laptop','shopping','sun','heart','camera','cake',
  'wine','tree','walk','flower','cat','globe',
];
let selectedIcon = 'pin';

function openCatModal() {
  selectedIcon = 'pin';
  document.getElementById('catModal').style.display = 'flex';
  document.getElementById('catModalInput').value = '';
  renderIconPicker();
  setTimeout(() => document.getElementById('catModalInput').focus(), 100);
}

function renderIconPicker() {
  document.getElementById('iconPicker').innerHTML = ICON_OPTS.map(key => `
    <button class="icon-opt ${selectedIcon === key ? 'on' : ''}" onclick="pickIcon('${key}')">
      ${(SVG[key] || SVG.pin).replace('<svg', '<svg width="16" height="16" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"')}
    </button>`).join('');
}

function pickIcon(key) { selectedIcon = key; renderIconPicker(); }

function saveCustomCat() {
  const name = document.getElementById('catModalInput').value.trim();
  if (!name) return;
  const id = 'custom_' + Date.now();
  customCats.push({ id, name, icon: selectedIcon });
  saveCats(); renderFilters(); renderAddCats();
  document.getElementById('catModal').style.display = 'none';
}

function deleteCustomCat(id) {
  if (!confirm('刪除這個分類？（已標記此分類的地點不受影響）')) return;
  customCats = customCats.filter(c => c.id !== id);
  currentFilters = currentFilters.filter(f => f !== id);
  saveCats(); renderFilters(); renderMain();
}

// ── Export / Import ────────────────────────────────────────────────────────
function exportData() {
  const data = JSON.stringify(spots, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `myspots_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function handleImport(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const imported = JSON.parse(evt.target.result);
      if (!Array.isArray(imported)) throw new Error('格式錯誤');
      const existingIds = new Set(spots.map(s => s.id));
      const newOnes = imported.filter(s => s.id && !existingIds.has(s.id));
      const dupes = imported.length - newOnes.length;
      spots = [...newOnes, ...spots];
      save(); renderMain();
      const msg = newOnes.length > 0
        ? `✅ 成功匯入 ${newOnes.length} 筆${dupes > 0 ? `，${dupes} 筆已存在略過` : ''}`
        : `所有資料已存在，無需匯入`;
      alert(msg);
    } catch(err) {
      alert('❌ 匯入失敗：' + err.message);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// ── Overlay ────────────────────────────────────────────────────────────────
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
function handleOverlay(e, id) { if (e.target.id === id) closeOverlay(id); }

// ── Migrate old data ───────────────────────────────────────────────────────
function migrateSpots() {
  // 嘗試從舊版 key 讀取資料並合併（v2/v3 → v4）
  const oldKeys = ['myspots_v3', 'myspots_v2', 'myspots'];
  for (const key of oldKeys) {
    const oldRaw = localStorage.getItem(key);
    if (oldRaw) {
      try {
        const oldSpots = JSON.parse(oldRaw);
        if (Array.isArray(oldSpots) && oldSpots.length > 0) {
          // 合併：只加入 v4 中不存在的 id
          const existingIds = new Set(spots.map(s => s.id));
          const newOnes = oldSpots.filter(s => s.id && !existingIds.has(s.id));
          if (newOnes.length > 0) spots = [...spots, ...newOnes];
        }
      } catch(e) {}
    }
  }

  // 欄位正規化
  let changed = false;
  let catsChanged = false;
  spots = spots.map(s => {
    const updated = { ...s };
    // 舊資料沒有 categories，用舊的 category 欄位轉換
    if (!updated.categories) {
      const map = { '餐廳': 'food', '咖啡廳': 'coffee', '民宿': 'stay', '景點': 'scene' };
      if (updated.category === '其他') {
        if (!customCats.find(c => c.id === 'other')) {
          customCats.push({ id: 'other', name: '其他', icon: 'pin' });
          catsChanged = true;
        }
        updated.categories = ['other'];
      } else {
        updated.categories = updated.category ? [map[updated.category] || 'food'] : [];
      }
      changed = true;
    }
    // 若 categories 裡有 'other' 但自訂分類沒有，自動補上
    if (updated.categories?.includes('other') && !customCats.find(c => c.id === 'other') && !DEFAULT_CATS.find(c => c.id === 'other')) {
      customCats.push({ id: 'other', name: '其他', icon: 'pin' });
      catsChanged = true;
    }
    if (updated.visited === undefined) { updated.visited = false; changed = true; }
    if (updated.county === undefined) { updated.county = ''; changed = true; }
    return updated;
  });
  if (catsChanged) saveCats();
  if (changed) save();
}

// ── Init ───────────────────────────────────────────────────────────────────
applyTheme();
migrateSpots();
checkSetup();
renderFilters();
renderMain();

// 支援 ?q=店名 或 #店名 URL 參數（iOS 捷徑用）
(function() {
  const fromHash = location.hash ? decodeURIComponent(location.hash.slice(1)) : '';
  const fromQuery = new URLSearchParams(location.search).get('q') || '';
  const q = (fromHash || fromQuery).trim();
  if (q && getKey()) {
    openAddModal();
    setTimeout(() => {
      document.getElementById('addSearch').value = q;
      doSearch();
    }, 350);
  }
})();
</script>
