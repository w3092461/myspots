<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>我的收藏</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
/* ── Theme ── */
:root {
  /* ── 規格變數 ── */
  --color-bg: #EEF3F7;
  --color-card: #FFFFFF;
  --color-primary: #3DAA8C;
  --color-star: #F5A623;
  --color-heart: #E05C5C;
  --color-maps: #4285F4;
  --color-text: #2D2D2D;
  --color-text-secondary: #888888;
  --color-border: #F0F0F0;
  --color-tag-bg: rgba(0,0,0,0.45);
  --shadow-card: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-hover: 0 8px 24px rgba(0,0,0,0.10);

  /* ── 內部對照（保持現有 CSS 可用）── */
  --bg: var(--color-bg); --bg2: #DDE5EB; --bg3: #CDD8E0;
  --sidebar-bg: var(--color-card);
  --card: var(--color-card); --border: var(--color-border); --border2: rgba(0,0,0,0.12);
  --text: var(--color-text); --text2: var(--color-text-secondary); --text3: #AAAAAA;
  --accent: var(--color-text);
  --gold: var(--color-star); --visited: #C8E6C9;
  --shadow: var(--shadow-card);
  --radius: 16px;
  --accent-color: var(--color-primary);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', 'Noto Sans TC', sans-serif; background: var(--color-bg); color: var(--color-text); min-height: 100vh; }

/* ── Region toggle ── */
.region-toggle { display: flex; gap: 2px; background: var(--bg2); border-radius: 6px; padding: 2px; flex-shrink: 0; }
.region-btn { flex: 1; padding: 5px 11px; border-radius: 4px; border: none; background: transparent; font-size: 13px; font-weight: 500; color: var(--color-text); cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; white-space: nowrap; text-align: center; }
.region-btn.on { background: var(--accent-color); color: #fff; }

/* ── Header ── */
.hdr { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--bg); position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Noto Sans TC', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
.logo small { color: var(--text3); font-size: 10px; font-family: 'Noto Sans TC', sans-serif; font-weight: 400; display: block; letter-spacing: 0.08em; }
.hdr-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.icon-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.2s; flex-shrink: 0; }
.icon-btn:hover { background: var(--bg3); color: var(--text); }
.cnt { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; white-space: nowrap; }

/* ── Search bar ── */
.search-wrap { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg); }
.search-inner { display: flex; align-items: center; gap: 8px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 6px; padding: 9px 14px; }
.search-inner svg { flex-shrink: 0; opacity: 0.4; }
.search-bar { flex: 1; background: none; border: none; outline: none; font-size: 14px; color: var(--text); font-family: 'Noto Sans TC', sans-serif; }
.search-bar::placeholder { color: var(--text3); }
.search-clear { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 0; display: none; }
.search-clear.show { display: block; }
.sort-sel { background: none; border: none; outline: none; font-size: 11px; color: var(--text3); cursor: pointer; font-family: 'Noto Sans TC', sans-serif; flex-shrink: 0; max-width: 72px; }

/* ── View tabs ── */
.view-tabs { padding: 10px 16px 0; display: flex; gap: 0; border-bottom: 1px solid var(--border); }
.view-tab { padding: 8px 16px; font-size: 13px; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; font-family: 'Noto Sans TC', sans-serif; }
.view-tab.on { color: var(--accent-color); border-bottom-color: var(--accent-color); font-weight: 600; }

/* ── Filters ── */
.filter-section { padding: 10px 16px; display: flex; gap: 6px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; align-items: center; flex-wrap: nowrap; }
.filter-section::-webkit-scrollbar { display: none; }
.ftag { flex-shrink: 0; padding: 5px 13px; border: 1px solid var(--border2); border-radius: 4px; background: transparent; font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 5px; font-weight: 500; }
.ftag svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.ftag:hover { border-color: var(--text); color: var(--text); }
.ftag.on { background: var(--accent-color); border-color: var(--accent-color); color: #fff; font-weight: 500; }
.ftag-add { flex-shrink: 0; padding: 5px 11px; border: 1px dashed var(--border2); border-radius: 20px; background: transparent; font-size: 11px; color: var(--text3); cursor: pointer; white-space: nowrap; }
.ftag-add:hover { border-color: var(--text); color: var(--text); }

/* ── County filter bar ── */
.county-filter-section { padding: 8px 16px; display: flex; gap: 6px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; align-items: center; flex-wrap: nowrap; background: var(--bg2); }
.county-filter-section::-webkit-scrollbar { display: none; }
.county-ftag { flex-shrink: 0; padding: 4px 12px; border: 1px solid var(--border2); border-radius: 20px; background: var(--bg); font-size: 11px; color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.county-ftag:hover { border-color: var(--text); color: var(--text); }
.county-ftag.on { background: var(--text); border-color: var(--text); color: var(--bg); }

/* ── County view ── */
.county-section { padding: 16px; }
.county-group { margin-bottom: 20px; }
.county-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.county-count { font-size: 10px; color: var(--text3); font-weight: 300; }

/* ── Card grid ── */
.grid { padding: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-content: start; }

/* ── Card ── */
.card { background: var(--color-card); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-card); transition: transform 0.2s ease, box-shadow 0.2s ease; cursor: pointer; position: relative; height: 380px; display: flex; flex-direction: column; }
.card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
.card.dragging { opacity: 0.4; transform: scale(0.97); }
.card.drag-over { outline: 2px dashed var(--color-primary); }

/* Card image wrapper */
.card-img-wrap { position: relative; height: 200px; overflow: hidden; flex-shrink: 0; }
.card-img { width: 100%; height: 200px; object-fit: cover; display: block; }
.card-ph { width: 100%; height: 200px; background: #DDE4EA; display: flex; align-items: center; justify-content: center; }
.card-ph svg { width: 36px; height: 36px; stroke: #A8B8C4; fill: none; stroke-width: 1.2; }

/* Category tag — absolute, bottom-left of image */
.card-cat-tag { position: absolute; bottom: 10px; left: 10px; background: var(--color-tag-bg); color: #FFFFFF; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; pointer-events: none; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }

/* Fav button — absolute, top-right of image */
.card-fav-btn { position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; border-radius: 50%; background: #FFFFFF; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: transform 0.15s; }
.card-fav-btn:hover { transform: scale(1.12); }
.card-fav-btn svg { width: 15px; height: 15px; stroke: var(--color-heart); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: fill 0.15s; }
.card-fav-btn.active svg { fill: var(--color-heart); }

/* Card body */
.card-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-height: 0; }
.card-name { font-size: 16px; font-weight: 600; color: var(--color-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
.card-rating { display: flex; align-items: center; gap: 4px; margin-bottom: 5px; min-height: 24px; }
.card-rating-score { font-size: 13px; font-weight: 700; color: var(--color-text); }
.card-rating-count { font-size: 12px; color: var(--color-text-secondary); }
.card-addr { font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-height: 20px; }
.card-loc { font-size: 11px; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; opacity: 0.8; }

/* Card footer — 3 icons, equal spacing */
.card-footer { border-top: 1px solid var(--color-border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-around; flex-shrink: 0; }
.card-icon-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; text-decoration: none; flex-shrink: 0; }
.card-icon-btn:hover { background: var(--color-bg); }
.card-icon-btn.maps-btn:hover { background: #E8F0FE; }
.card-icon-divider { width: 1px; height: 20px; background: var(--color-border); }

/* Footer icon states */
.ih { stroke: #CCCCCC; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.15s, fill 0.15s; }
.card-icon-btn.heart-on .ih { stroke: var(--color-heart); fill: var(--color-heart); }
.ick { stroke: #CCCCCC; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.15s; }
.card-icon-btn.check-on .ick { stroke: var(--color-primary); }

/* Detail pill tags (used in detail sheet) */
.detail-pill { font-size: 11px; font-weight: 500; border: none; border-radius: 20px; padding: 3px 10px; display: inline-flex; align-items: center; line-height: 1; }

/* Card note & trip tags */
.card-note { font-size: 11px; color: var(--text2); font-style: italic; line-height: 1.5; margin-top: 5px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.card-trips { display: flex; flex-wrap: nowrap; gap: 4px; margin-top: 6px; overflow: hidden; }
.card-trip-tag { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; background: rgba(61,170,140,0.12); color: var(--color-primary); line-height: 1.6; }

/* Sidebar bottom actions */
.sb-actions { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--color-border); display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }

/* ── Empty ── */
.empty { grid-column: 1/-1; text-align: center; padding: 72px 20px; }
.empty svg { width: 48px; height: 48px; stroke: var(--text3); fill: none; stroke-width: 1; margin-bottom: 16px; stroke-linecap: round; stroke-linejoin: round; }
.empty-title { font-family: 'Noto Sans TC', sans-serif; font-size: 17px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
.empty-sub { font-size: 12px; color: var(--text3); line-height: 1.8; }

/* ── FAB ── */
.fab { position: fixed; bottom: 26px; right: 22px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent-color); color: #fff; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 50; transition: transform 0.2s; }
.fab:hover { transform: scale(1.08); }
.fab:active { transform: scale(0.95); }

/* ── Overlay / Sheet ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.22s; }
.overlay.open { opacity: 1; pointer-events: all; }
.sheet { background: var(--bg); border: 1px solid var(--border2); border-radius: 16px 16px 0 0; width: 100%; max-width: 560px; padding: 24px 22px 44px; transform: translateY(30px); transition: transform 0.28s cubic-bezier(0.34,1.3,0.64,1); max-height: 92vh; overflow-y: auto; }
.overlay.open .sheet { transform: translateY(0); }
.handle { width: 34px; height: 3px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
.sheet-title { font-family: 'Noto Sans TC', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.sheet-sub { font-size: 12px; color: var(--text3); margin-bottom: 18px; line-height: 1.6; }

/* ── Form elements ── */
.field { margin-bottom: 12px; }
.field label { font-size: 10px; letter-spacing: 0.1em; color: var(--text3); display: block; margin-bottom: 5px; text-transform: uppercase; }
.input { width: 100%; padding: 11px 13px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-size: 13px; outline: none; font-family: 'Noto Sans TC', sans-serif; transition: border-color 0.2s; }
.input:focus { border-color: var(--accent-color); }
.input::placeholder { color: var(--text3); }
textarea.input { resize: vertical; min-height: 72px; line-height: 1.6; }
.search-row { display: flex; gap: 8px; }
.search-row .input { flex: 1; }
.btn-search { padding: 11px 16px; background: var(--accent-color); color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: 'Noto Sans TC', sans-serif; transition: opacity 0.15s; }
.btn-search:hover { opacity: 0.8; }
.btn-search:disabled { opacity: 0.4; cursor: not-allowed; }

/* Cat multi-select in form */
.cat-picks { display: flex; gap: 5px; flex-wrap: wrap; }
.cat-pick { padding: 5px 12px; border: 1px solid var(--border2); border-radius: 20px; background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 4px; }
.cat-pick svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.cat-pick.on { background: var(--accent-color); border-color: var(--accent-color); color: #fff; }

/* Progress */
.prog { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; margin-bottom: 8px; }
.prog-fill { height: 100%; background: var(--accent-color); border-radius: 1px; transition: width 0.4s ease; }
.status { font-size: 11px; color: var(--text2); text-align: center; min-height: 16px; margin-bottom: 10px; }
.status.err { color: #e05555; }

/* Results */
.results-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
.result-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 9px; cursor: pointer; transition: border-color 0.15s; }
.result-item:hover, .result-item.on { border-color: var(--accent-color); }
.result-item-info { flex: 1; min-width: 0; }
.result-item-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.result-item-addr { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-item-rating { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* Selected preview */
.result-box { display: flex; gap: 12px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 10px; padding: 12px; margin-bottom: 12px; }
.result-thumb { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--bg3); }
.result-thumb-ph { width: 64px; height: 64px; border-radius: 8px; flex-shrink: 0; background: var(--bg3); display: flex; align-items: center; justify-content: center; }
.result-thumb-ph svg { width: 24px; height: 24px; stroke: var(--text3); fill: none; stroke-width: 1.2; }
.result-info { flex: 1; min-width: 0; }
.result-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.result-addr { font-size: 11px; color: var(--text2); line-height: 1.5; }
.result-rating { font-size: 11px; color: var(--text2); margin-top: 3px; }

/* Hint */
.hint { font-size: 11px; color: var(--text3); padding: 8px 12px; background: var(--bg2); border-radius: 7px; margin-bottom: 12px; line-height: 1.6; }

/* Actions */
.actions { display: flex; gap: 8px; margin-top: 4px; }
.btn-main { flex: 1; padding: 12px; background: var(--accent-color); color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: opacity 0.15s; }
.btn-main:hover { opacity: 0.85; }
.btn-main:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-sec { padding: 13px 18px; background: transparent; color: var(--text2); border: 1px solid var(--border2); border-radius: 9px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }

.detail-close { position: absolute; top: 16px; right: 16px; width: 30px; height: 30px; border-radius: 50%; background: var(--bg3); border: none; color: var(--text2); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; z-index: 10; }
.detail-close:hover { background: var(--border2); color: var(--text); }
.sheet { position: relative; }
.detail-img { width: 100%; height: 200px; object-fit: cover; border-radius: 0; margin-bottom: 0; background: var(--bg2); display: block; }
.detail-ph { width: 100%; height: 200px; background: var(--bg2); border-radius: 10px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; }
.detail-ph svg { width: 48px; height: 48px; stroke: var(--text3); fill: none; stroke-width: 1; }
.detail-ph { width: 100%; height: 200px; background: var(--bg2); border-radius: 10px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; }
.detail-ph svg { width: 48px; height: 48px; stroke: var(--text3); fill: none; stroke-width: 1; }
.detail-title { font-family: 'Noto Sans TC', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.detail-cats { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.detail-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; font-size: 13px; color: var(--text2); line-height: 1.6; }
.detail-row svg { width: 15px; height: 15px; stroke: var(--text3); fill: none; stroke-width: 1.5; flex-shrink: 0; margin-top: 2px; stroke-linecap: round; stroke-linejoin: round; }
.detail-row a { color: var(--text); text-decoration: underline; word-break: break-all; }
.detail-note { background: var(--bg2); border-radius: 8px; padding: 12px; font-size: 13px; color: var(--text2); line-height: 1.7; font-style: italic; margin-bottom: 10px; }
.detail-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
.enrich-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: rgba(61,170,140,0.08); border: 1px solid rgba(61,170,140,0.20); border-radius: 10px; padding: 10px 14px; margin: 12px 0 0; }
.enrich-hint { font-size: 12px; color: var(--color-text-secondary); }
.enrich-btn { padding: 7px 14px; background: var(--color-primary); color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: inherit; transition: opacity 0.15s; }
.enrich-btn:hover { opacity: 0.85; }
.enrich-btn:disabled { opacity: 0.4; cursor: default; }
.detail-btn { flex: 1; min-width: 120px; padding: 11px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 9px; font-size: 12px; color: var(--text2); cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px; }
.detail-btn:hover { border-color: var(--text); color: var(--text); }
.detail-btn.danger:hover { border-color: #e05555; color: #e05555; }
.detail-btn.visited-on { background: var(--text); color: var(--bg); border-color: var(--text); }
.detail-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/* Edit form in detail */
.edit-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }

/* ── Trip filter row ── */
.trip-section { padding: 8px 16px; display: flex; gap: 6px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; align-items: center; flex-wrap: nowrap; background: var(--bg2); }
.trip-section::-webkit-scrollbar { display: none; }
.trip-tag { flex-shrink: 0; padding: 4px 12px; border: 1px solid var(--border2); border-radius: 20px; background: var(--bg); font-size: 11px; color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
.trip-tag:hover { border-color: var(--text); color: var(--text); }
.trip-tag.on { background: var(--accent-color); border-color: var(--accent-color); color: #fff; }
.trip-tag-del { margin-left: 2px; opacity: 0.6; font-size: 12px; line-height: 1; cursor: pointer; }
.trip-tag-del:hover { opacity: 1; }
.trip-add { flex-shrink: 0; padding: 4px 11px; border: 1px dashed var(--border2); border-radius: 20px; background: transparent; font-size: 11px; color: var(--text3); cursor: pointer; white-space: nowrap; }
.trip-add:hover { border-color: var(--text); color: var(--text); }

/* ── Trip pick in detail ── */
.trip-picks { display: flex; gap: 5px; flex-wrap: wrap; }
.trip-pick { padding: 5px 12px; border: 1px solid var(--border2); border-radius: 20px; background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; transition: all 0.15s; }
.trip-pick.on { background: var(--accent-color); border-color: var(--accent-color); color: #fff; }

/* ── KML modal ── */
.kml-opt { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border: 1px solid var(--border2); border-radius: 8px; cursor: pointer; margin-bottom: 8px; transition: border-color 0.15s; }
.kml-opt:hover { border-color: var(--text); }
.kml-opt input[type=radio] { accent-color: var(--accent-color); cursor: pointer; }
.kml-opt-label { font-size: 13px; color: var(--text); }
.kml-opt-sub { font-size: 11px; color: var(--text3); }

/* ── Photo upload & focal drag ── */
.focal-wrap { position: relative; border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; user-select: none; -webkit-user-select: none; }
.focal-wrap img { width: 100%; height: 160px; object-fit: cover; display: block; cursor: grab; }
.focal-wrap img.focal-grabbing { cursor: grabbing; }
.focal-hint { position: absolute; bottom: 0; left: 0; right: 0; padding: 6px 8px; text-align: center; font-size: 10px; color: rgba(255,255,255,0.9); background: linear-gradient(transparent, rgba(0,0,0,0.5)); pointer-events: none; letter-spacing: 0.03em; }
.sheet-close { position: absolute; top: 14px; right: 14px; width: 30px; height: 30px; border-radius: 50%; background: var(--bg3); border: none; color: var(--text2); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; z-index: 10; }
.sheet-close:hover { background: var(--border2); color: var(--text); }
.upload-trigger { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 10px; border: 1.5px dashed var(--border2); border-radius: var(--radius); font-size: 12px; color: var(--text3); cursor: pointer; transition: all 0.15s; background: var(--bg2); font-family: 'Noto Sans TC', sans-serif; }
.upload-trigger:hover { border-color: var(--accent-color); color: var(--accent-color); }

/* Setup */
.setup-wrap { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 24px; }
.setup-box { max-width: 400px; width: 100%; }
.setup-box h2 { font-family: 'Noto Sans TC', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.setup-box p { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 24px; }
.setup-note { font-size: 11px; color: var(--text3); text-align: center; margin-top: 14px; line-height: 1.6; }

/* Context menu */
.ctx-menu { position: fixed; background: var(--bg); border: 1px solid var(--border2); border-radius: 10px; padding: 6px; z-index: 400; box-shadow: 0 8px 30px rgba(0,0,0,0.15); min-width: 150px; }
.ctx-item { padding: 10px 14px; font-size: 13px; color: var(--text2); cursor: pointer; border-radius: 6px; display: flex; align-items: center; gap: 8px; transition: background 0.1s; }
.ctx-item:hover { background: var(--bg2); color: var(--text); }
.ctx-item.danger:hover { color: #e05555; }
.ctx-item svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spin { display: inline-block; width: 11px; height: 11px; border: 1.5px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }

/* Custom cat modal */
.modal-sm { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 600; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-sm-box { background: var(--bg); border: 1px solid var(--border2); border-radius: 14px; padding: 24px; max-width: 340px; width: 100%; }
.modal-sm-box h3 { font-size: 16px; font-weight: 500; margin-bottom: 14px; color: var(--text); }

/* Deletable filter tag */
.ftag-del { margin-left: 3px; opacity: 0.5; font-size: 13px; line-height: 1; cursor: pointer; }
.ftag-del:hover { opacity: 1; }

/* Icon picker grid */
.icon-picker { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 14px; }
.icon-opt { width: 100%; aspect-ratio: 1; border: 1px solid var(--border2); border-radius: 8px; background: var(--bg2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.icon-opt:hover { border-color: var(--text); background: var(--bg3); }
.icon-opt.on { border-color: var(--text); background: var(--text); color: var(--bg); }
.icon-opt svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.ac-wrap { position: relative; flex: 1; }
.ac-list { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--bg); border: 1px solid var(--border2); border-radius: 10px; z-index: 300; box-shadow: 0 8px 24px rgba(0,0,0,0.12); overflow: hidden; max-height: 240px; overflow-y: auto; }
.ac-item { padding: 10px 14px; cursor: pointer; transition: background 0.1s; border-bottom: 1px solid var(--border); }
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.focused { background: var(--bg2); }
.ac-item-main { font-size: 13px; color: var(--text); font-weight: 500; }
.ac-item-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

/* ── Desktop sidebar layout ── */
.layout-wrap { display: flex; min-height: 100vh; align-items: flex-start; }
.main-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }

.sidebar {
  display: none;
  width: 220px;
  flex-shrink: 0;
  background: var(--color-card);
  border-radius: 16px;
  position: sticky;
  top: 32px;
  max-height: calc(100vh - 64px);
  overflow-y: auto;
  flex-direction: column;
  padding: 20px;
}
.sidebar::-webkit-scrollbar { width: 0; }

/* Sidebar logo */
.sb-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--color-border); }
.sb-logo-icon { width: 34px; height: 34px; border-radius: 9px; background: var(--color-primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sb-logo-name { font-size: 13px; font-weight: 700; color: var(--color-text); line-height: 1.3; }
.sb-logo-sub { font-size: 10px; color: var(--color-text-secondary); letter-spacing: 0.06em; }

/* Sidebar region toggle */
.sb-region-toggle.region-toggle { background: var(--color-bg); border-radius: 8px; padding: 3px; margin-bottom: 20px; }
.sb-region-toggle .region-btn { border-radius: 6px; font-size: 11px; color: var(--color-text-secondary); }
.sb-region-toggle .region-btn.on { background: var(--color-card); color: var(--color-text); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

/* Sidebar stats */
.sb-stats { font-size: 12px; color: var(--color-text-secondary); padding: 0 2px 16px; display: flex; align-items: baseline; gap: 4px; border-bottom: 1px solid var(--color-border); margin-bottom: 4px; }
.sb-stats strong { font-size: 22px; font-weight: 700; color: var(--color-text); line-height: 1; }

/* Sidebar section label */
.sb-section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.10em; color: var(--color-text-secondary); text-transform: uppercase; padding: 14px 2px 6px; }

/* Sidebar filter/trip containers */
.sb-filter-wrap { display: flex; flex-direction: column; gap: 1px; }
.sb-trip-wrap { display: flex; flex-direction: column; gap: 1px; }

/* Sidebar category item (spec: flat icon + name + count) */
.cat-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 10px; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; font-family: inherit; transition: background 0.12s; }
.cat-item:hover { background: var(--color-bg); }
.cat-item.active { background: rgba(61,170,140,0.10); }
.cat-item.active .cat-name { color: var(--color-primary); font-weight: 600; }
.cat-icon { width: 22px; height: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.cat-name { flex: 1; font-size: 13px; color: var(--color-text); }
.cat-count { font-size: 11px; color: var(--color-text-secondary); }

/* Sidebar area item */
.area-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-radius: 8px; cursor: pointer; border: none; background: transparent; width: 100%; font-family: inherit; font-size: 13px; color: var(--color-text); transition: background 0.12s; text-align: left; }
.area-item:hover { background: var(--color-bg); }
.area-item.active { background: rgba(61,170,140,0.10); color: var(--color-primary); font-weight: 600; }
.area-count { font-size: 11px; color: var(--color-text-secondary); font-weight: 400; }

/* Sidebar emoji-badge category items */
.sb-cat-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 10px; cursor: pointer; transition: background 0.15s; border: none; background: transparent; width: 100%; text-align: left; font-family: 'Noto Sans TC', sans-serif; }
.sb-cat-item:hover { background: rgba(0,0,0,0.05); }
.sb-cat-item.on { background: var(--accent-color); }
.sb-cat-item.on .sb-cat-name { color: #fff; font-weight: 600; }
.sb-cat-item.on .sb-cat-count { color: rgba(255,255,255,0.7); }
.sb-cat-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 15px; border-radius: 6px; }
.sb-cat-name { flex: 1; font-size: 13px; color: var(--text); font-weight: 500; }
.sb-cat-count { font-size: 11px; color: var(--text3); }

/* Sidebar trip items */
.sb-trip-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 10px; cursor: pointer; transition: background 0.15s; border: none; background: transparent; width: 100%; text-align: left; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; color: var(--text); }
.sb-trip-item:hover { background: rgba(0,0,0,0.05); }
.sb-trip-item.on { background: var(--accent-color); }
.sb-trip-item.on .sb-cat-name { color: #fff; font-weight: 600; }

.hdr-brand { display: flex; align-items: center; gap: 12px; }

@media (min-width: 900px) {

  .grid { grid-template-columns: 1fr; padding: 12px; }
}

function renderAddTrips() {

// ── IndexedDB Photo Store ──────────────────────────────────────────────────
let _photoDB = null;

function openPhotoDB() {
  return new Promise(resolve => {
    const req = indexedDB.open('myspots-photos', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('photos');
    req.onsuccess = e => { _photoDB = e.target.result; resolve(); };
    req.onerror = () => resolve();
  });
}
function idbSavePhoto(id, dataUrl) {
  return new Promise(resolve => {
    if (!_photoDB) { resolve(false); return; }
    const tx = _photoDB.transaction('photos', 'readwrite');
    tx.objectStore('photos').put(dataUrl, id);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => resolve(false);
  });
}
function idbGetPhoto(id) {
  return new Promise(resolve => {
    if (!_photoDB) { resolve(null); return; }
    const tx = _photoDB.transaction('photos', 'readonly');
    const req = tx.objectStore('photos').get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => resolve(null);
  });
}
function idbDeletePhoto(id) {
  if (!_photoDB) return;
  const tx = _photoDB.transaction('photos', 'readwrite');
  tx.objectStore('photos').delete(id);
}
async function migratePhotosToIDB() {
  if (!_photoDB) return;
  for (const key of ['myspots_v4', 'myspots_abroad']) {
    const arr = JSON.parse(localStorage.getItem(key) || '[]');
    let changed = false;
    for (const s of arr) {
      if (s.photoData && s.photoData !== 'idb') {
        const ok = await idbSavePhoto(s.id, s.photoData);
        if (ok) { s.photoData = 'idb'; changed = true; }
      }
    }
    if (changed) localStorage.setItem(key, JSON.stringify(arr));
  }
  spots = JSON.parse(localStorage.getItem(spotKey()) || '[]');
}
async function recoverMissingIDBPhotos() {
  if (!_photoDB) return;
  for (const key of ['myspots_v4', 'myspots_abroad']) {
    const arr = JSON.parse(localStorage.getItem(key) || '[]');

// ── Photo upload & focal drag ──────────────────────────────────────────────
let pendingCustomPhoto = null;
let pendingFocalX = 0.5, pendingFocalY = 0.5;
let detailFocalX = 0.5, detailFocalY = 0.5;
let detailCustomPhoto = null;
let _focalDragging = false;


function compressImage(file, maxPx = 1200, quality = 0.8) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(1, maxPx / Math.max(img.width, img.height));
        const w = Math.round(img.width * ratio), h = Math.round(img.height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handlePhotoUpload(e, ctx) {
  const file = e.target.files[0];
  if (!file) return;
  const data = await compressImage(file);
  if (ctx === 'add') {
    pendingCustomPhoto = data;
    pendingFocalX = 0.5; pendingFocalY = 0.5;
    const img = document.getElementById('addFocalImg');
    img.src = data;
    const addImg = document.getElementById('addFocalImg');
    if (addImg) addImg.style.objectPosition = '50% 50%';
    document.getElementById('addFocalWrap').style.display = 'block';
    setupFocalDrag('addFocalImg', (x, y) => { pendingFocalX = x; pendingFocalY = y; });
  } else if (ctx === 'detail') {
    detailCustomPhoto = data;
    detailFocalX = 0.5; detailFocalY = 0.5;
    const img = document.getElementById('detailFocalImg');
    if (img) { img.src = data; img.style.objectPosition = '50% 50%'; }
    document.getElementById('detailFocalWrap').style.display = 'block';
    setupFocalDrag('detailFocalImg', (x, y) => { detailFocalX = x; detailFocalY = y; });
  }
  e.target.value = '';
}

function setupFocalDrag(imgId, callback) {
  const img = document.getElementById(imgId);
  if (!img) return;
  let dragging = false, startX = 0, startY = 0, startFX = 0.5, startFY = 0.5;

  const getSens = () => {
    const cw = img.offsetWidth || 300, ch = img.offsetHeight || 160;
    const nw = img.naturalWidth, nh = img.naturalHeight;
    if (!nw || !nh) return { sx: cw, sy: ch };
    const ca = cw / ch, ia = nw / nh;
    if (ca > ia) {
      const dh = cw / ia;
      return { sx: cw * 4, sy: Math.max(dh - ch, 8) };
    } else {
      const dw = ch * ia;
      return { sx: Math.max(dw - cw, 8), sy: ch * 4 };
    }
  };

  const getClient = e => e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };

  const onStart = e => {
    dragging = true;
    img.classList.add('focal-grabbing');
    const c = getClient(e);
    startX = c.x; startY = c.y;
    const parts = (img.style.objectPosition || '50% 50%').split(' ');
    startFX = parseFloat(parts[0]) / 100 || 0.5;
    startFY = parseFloat(parts[1]) / 100 || 0.5;
    e.preventDefault();
  };

  const onMove = e => {
    if (!dragging) return;
    e.preventDefault();
    const c = getClient(e);
    const { sx, sy } = getSens();
    const fx = Math.max(0, Math.min(1, startFX - (c.x - startX) / sx));
    const fy = Math.max(0, Math.min(1, startFY - (c.y - startY) / sy));
    img.style.objectPosition = `${(fx * 100).toFixed(1)}% ${(fy * 100).toFixed(1)}%`;
    callback(fx, fy);
  };

  const onEnd = () => { dragging = false; img.classList.remove('focal-grabbing'); };

  img.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
  img.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onEnd);
}

      trips.map(t => `<option value="${t.id}">${t.name}</option>`).join('');

    tripOpts.style.display = 'none';
  }
  document.getElementById('kmlModal').style.display = 'flex';

function doExportKml() {
  const scope = document.querySelector('input[name=kmlScope]:checked')?.value || 'current';
  let list;
  if (scope === 'current') list = getFilteredSpots();
  else if (scope === 'trip') {
    const tripId = document.getElementById('kmlTripSel').value;
    if (!tripId) { alert('請選擇行程'); return; }
    list = spots.filter(s => s.trips?.includes(tripId));
  } else list = [...spots];

  const esc = s => (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const placemarks = list.map(s => {
    const coord = (s.lat && s.lng) ? `<Point><coordinates>${s.lng},${s.lat},0</coordinates></Point>` : '';
    const desc = [s.address, s.rating ? `評分 ${s.rating}` : '', s.note].filter(Boolean).join(' | ');
    return `  <Placemark>\n    <name>${esc(s.name)}</name>\n    <description>${esc(desc)}</description>\n    ${coord}\n  </Placemark>`;
  }).join('\n');

  const kml = `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document>\n<name>${esc('我的收藏')}</name>\n${placemarks}\n</Document></kml>`;
  const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `myspots_${new Date().toISOString().slice(0,10)}.kml`;
  a.click();
  document.getElementById('kmlModal').style.display = 'none';
}

// ── Main render ────────────────────────────────────────────────────────────
function getFilteredSpots() {
  let list = [...spots];
  if (currentView === 'visited') list = list.filter(s => s.visited);
  if (currentView === 'fav') list = list.filter(s => s.favourited);
  if (currentFilters.length) list = list.filter(s => s.categories?.some(c => currentFilters.includes(c)));
  if (region === 'tw' && countyFilter) list = list.filter(s => (s.county?.slice(0,2) || s.county) === countyFilter);
  if (region === 'abroad' && countryFilter && currentView !== 'all') list = list.filter(s => s.county === countryFilter);
  if (region === 'abroad' && abroadCityFilter && currentView !== 'all') list = list.filter(s => s.city === abroadCityFilter);
  if (currentTripFilter) list = list.filter(s => s.trips?.includes(currentTripFilter));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(s =>
      s.name?.toLowerCase().includes(q) ||
      s.address?.toLowerCase().includes(q) ||
      s.county?.toLowerCase().includes(q) ||
      s.note?.toLowerCase().includes(q)
    );
  }
  if (sortOrder === 'newest') list.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
  if (sortOrder === 'oldest') list.sort((a, b) => (a.createdAt || '').localeCompare(b.createdAt || ''));
  return list;
}

  const groups = {};
  list.forEach(s => {
    const key = (s.county?.slice(0,2) || s.county) || '未分縣市';
    if (!groups[key]) groups[key] = [];
    groups[key].push(s);
  });

  content.innerHTML = '';
  if (!Object.keys(groups).length) {
    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.innerHTML = `<div class="empty">
      ${SVG.map.replace('<svg', '<svg width="48" height="48" stroke="var(--text3)" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"')}
      <div class="empty-title">沒有符合的地點</div>
    </div>`;
    content.appendChild(grid);
    return;
  }

  const sec = document.createElement('div');
  sec.className = 'county-section';
  Object.entries(groups).sort().forEach(([county, items]) => {
    const group = document.createElement('div');
    group.className = 'county-group';
    group.innerHTML = `<div class="county-title">${county} <span class="county-count">${items.length} 個地點</span></div>`;
    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.style.padding = '0';
    grid.style.marginTop = '8px';
    items.forEach(s => grid.appendChild(makeCard(s)));
    group.appendChild(grid);
    sec.appendChild(group);
  });
  content.appendChild(sec);
  refreshIcons();
}

    group.innerHTML = `<div class="county-title">${country} <span class="county-count">${items.length} 個地點</span></div>`;

    const cityGroups = {};
    items.forEach(s => { const c = s.city || ''; if (!cityGroups[c]) cityGroups[c] = []; cityGroups[c].push(s); });

function renderCityView(content) {
  const list = getFilteredSpots();
  const groups = {};
  list.forEach(s => {
    const key = s.city || '（未分城市）';
    if (!groups[key]) groups[key] = [];
    groups[key].push(s);
  });

  content.innerHTML = '';
  if (!Object.keys(groups).length) {
    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.innerHTML = `<div class="empty">
      ${SVG.map.replace('<svg', '<svg width="48" height="48" stroke="var(--text3)" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"')}
      <div class="empty-title">${spots.length === 0 ? '還沒有國外收藏' : '沒有符合的地點'}</div>

  }

  const sec = document.createElement('div');
  sec.className = 'county-section';
  const sortedKeys = Object.keys(groups).sort((a, b) => {
    if (a === '（未分城市）') return 1;
    if (b === '（未分城市）') return -1;
    return a.localeCompare(b, 'zh-TW');
  });
  sortedKeys.forEach(city => {

function makeCard(s) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = s.id;
  card.draggable = true;

  // First category for image overlay tag
  const firstCatId = (s.categories || [])[0];
  const firstCat = firstCatId ? allCats().find(c => c.id === firstCatId) : null;

  // Rating row
  const ratingHtml = s.rating ? `
    <div class="card-rating">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="${'#F5A623'}" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span class="card-rating-score">${s.rating}</span>
      ${s.reviewCount ? `<span class="card-rating-count">(${s.reviewCount})</span>` : ''}
    </div>` : '';

  // Google Maps URL per spec
  const mapsQuery = encodeURIComponent((s.name || '') + (s.address ? ' ' + s.address : ''));
  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${mapsQuery}`;

  // Trip tags
  const spotTrips = (s.trips || []).map(tid => trips.find(t => t.id === tid)).filter(Boolean);
  const tripTagsHtml = spotTrips.length
    ? `<div class="card-trips">${spotTrips.map(t => `<span class="card-trip-tag">${t.name}</span>`).join('')}</div>`
    : '';

  const _photoSrc = (s.photoData && s.photoData !== 'idb') ? s.photoData : (s.photoUrl || '');
  const photoHtml = (s.photoData || s.photoUrl)
    ? `<img class="card-img" src="${_photoSrc}" loading="lazy" onerror="this.style.display='none'" style="object-position:${((s.focalX??0.5)*100).toFixed(0)}% ${((s.focalY??0.5)*100).toFixed(0)}%">`
    : `<div class="card-ph"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#A8B8C4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>`;

  card.innerHTML = `
    <div class="card-img-wrap">
      ${photoHtml}
      ${firstCat ? `<span class="card-cat-tag">${firstCat.name}</span>` : ''}
      <button class="card-fav-btn${s.favourited ? ' active' : ''}" onclick="event.stopPropagation();toggleFav('${s.id}')">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
    </div>
    <div class="card-body">
      <div class="card-name">${s.name}</div>
      ${ratingHtml}
      ${region === 'abroad' && (s.county || s.city)
        ? `<div class="card-addr">${[s.county, s.city].filter(Boolean).join(' · ')}</div>`
        : s.address ? `<div class="card-addr">${s.address}</div>` : ''}
      ${s.note ? `<div class="card-note">${s.note}</div>` : ''}
      ${tripTagsHtml}
    </div>
    <div class="card-footer">
      <button class="card-icon-btn${s.favourited ? ' heart-on' : ''}" onclick="event.stopPropagation();toggleFav('${s.id}')">
        <svg width="18" height="18" viewBox="0 0 24 24"><path class="ih" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <div class="card-icon-divider"></div>
      <button class="card-icon-btn${s.visited ? ' check-on' : ''}" onclick="event.stopPropagation();toggleVisited('${s.id}')">
        <svg width="18" height="18" viewBox="0 0 24 24"><polyline class="ick" points="20 6 9 17 4 12"/></svg>
      </button>
      <div class="card-icon-divider"></div>
      <a class="card-icon-btn maps-btn" href="${mapsUrl}" target="_blank" onclick="event.stopPropagation()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#4285F4"/><circle cx="12" cy="9" r="2.5" fill="white"/></svg>
      </a>
    </div>`;

  card.onclick = () => openDetail(s.id);
  if (s.photoData === 'idb') {
    idbGetPhoto(s.id).then(data => {
      const img = card.querySelector('.card-img');
      if (!img) return;
      if (data) { img.src = data; return; }
      if (s.photoUrl) img.src = s.photoUrl;
      else img.style.display = 'none';
    });
  }
  card.addEventListener('dragstart', e => { dragSrcId = s.id; card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));
  card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
  card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
  card.addEventListener('drop', e => {
    e.preventDefault(); card.classList.remove('drag-over');
    if (dragSrcId && dragSrcId !== s.id) {
      const from = spots.findIndex(x => x.id === dragSrcId);
      const to = spots.findIndex(x => x.id === s.id);
      if (from !== -1 && to !== -1) {
        const [item] = spots.splice(from, 1);
        spots.splice(to, 0, item);
        save(); renderMain();
      }
    }
  });
  return card;
}

// ── County filter bar ──────────────────────────────────────────────────────
function renderCountyFilters() {
  const sec = document.getElementById('countyFilterSection');
  const counties = [...new Set(spots.map(s => s.county?.slice(0,2) || s.county).filter(Boolean))].sort();
  if (!counties.length) { sec.style.display = 'none'; renderSidebarArea([]); return; }
  sec.style.display = currentView === 'county' ? 'flex' : 'none';
  sec.innerHTML = `<button class="county-ftag ${!countyFilter ? 'on' : ''}" onclick="setCountyFilter('')">全部</button>` +
    counties.map(c => `<button class="county-ftag ${countyFilter === c ? 'on' : ''}" onclick="setCountyFilter('${c}')">${c}</button>`).join('');
  renderSidebarArea(counties, false);
}

function renderSidebarArea(items, isCountry) {
  const label = document.getElementById('sbAreaLabel');
  const wrap = document.getElementById('sbAreaSection');
  if (!label || !wrap) return;
  if (!items.length) { label.style.display = 'none'; wrap.style.display = 'none'; return; }
  label.style.display = 'block'; wrap.style.display = 'flex';
  const activeFilter = isCountry ? countryFilter : countyFilter;
  const clickFn = isCountry ? 'setCountryFilter' : 'setCountyFilter';
  wrap.innerHTML =
    `<button class="area-item${!activeFilter ? ' active' : ''}" onclick="${clickFn}('')">
      <span>全部</span>
      <span class="area-count">${spots.length}</span>
    </button>` +
    items.map(c => {
      const isOn = activeFilter === c;
      const cnt = spots.filter(s => (s.county?.slice(0,2) || s.county) === c).length;
      return `<button class="area-item${isOn ? ' active' : ''}" onclick="${clickFn}('${c.replace(/'/g,"\\'")}')">
        <span>${c}</span>
        ${cnt ? `<span class="area-count">${cnt}</span>` : ''}
      </button>`;
    }).join('');
}

function setCountyFilter(c) {
  countyFilter = c;
  renderCountyFilters();
  renderMain();
}

function renderAbroadFilters() {
  const sec = document.getElementById('countyFilterSection');
  const citySec = document.getElementById('cityFilterSection');
  const countries = [...new Set(spots.map(s => s.county).filter(Boolean))].sort();
  const isGroupedView = currentView === 'country' || currentView === 'city';

  if (!countries.length || !isGroupedView) {
    sec.style.display = 'none';
    citySec.style.display = 'none';
    renderSidebarArea([]);
    renderSidebarCity([]);
    return;
  }

  if (currentView === 'city') {
    // City view: top bar shows cities (scoped to selected country if any)
    const cityPool = spots.filter(s => (!countryFilter || s.county === countryFilter) && s.city);
    const allCities = [...new Set(cityPool.map(s => s.city))].sort();
    if (allCities.length) {
      sec.style.display = 'flex';
      sec.innerHTML = `<button class="county-ftag ${!abroadCityFilter?'on':''}" onclick="setAbroadCityFilter('')">全部</button>` +
        allCities.map(c => `<button class="county-ftag ${abroadCityFilter===c?'on':''}" onclick="setAbroadCityFilter('${c}')">${c}</button>`).join('');
    } else { sec.style.display = 'none'; }
    citySec.style.display = 'none';
  } else {
    // Country view: top bar shows countries
    sec.style.display = 'flex';
    sec.innerHTML = `<button class="county-ftag ${!countryFilter?'on':''}" onclick="setCountryFilter('')">全部</button>` +
      countries.map(c => `<button class="county-ftag ${countryFilter===c?'on':''}" onclick="setCountryFilter('${c}')">${c}</button>`).join('');
    // City sub-filter bar when a country is selected
    if (countryFilter) {
      const cities = [...new Set(spots.filter(s => s.county === countryFilter && s.city).map(s => s.city))].sort();
      if (cities.length) {
        citySec.style.display = 'flex';
        citySec.innerHTML = `<button class="county-ftag ${!abroadCityFilter?'on':''}" onclick="setAbroadCityFilter('')">全部城市</button>` +
          cities.map(c => `<button class="county-ftag ${abroadCityFilter===c?'on':''}" onclick="setAbroadCityFilter('${c}')">${c}</button>`).join('');
      } else { citySec.style.display = 'none'; }
    } else { citySec.style.display = 'none'; }
  }

  // Sidebar countries
  renderSidebarArea(countries, true);

  // Sidebar cities — scoped to selected country if any
  const cityPool = countryFilter
    ? spots.filter(s => s.county === countryFilter && s.city)
    : spots.filter(s => s.city);
  const allCities = [...new Set(cityPool.map(s => s.city))].sort();
  renderSidebarCity(allCities);
}

function renderSidebarCity(cities) {
  const label = document.getElementById('sbCityLabel');
  const wrap = document.getElementById('sbCitySection');
  if (!label || !wrap) return;
  if (!cities.length) { label.style.display = 'none'; wrap.style.display = 'none'; return; }
  label.style.display = 'block'; wrap.style.display = 'flex';
  wrap.innerHTML =
    `<button class="area-item${!abroadCityFilter ? ' active' : ''}" onclick="setAbroadCityFilter('')">
      <span>全部</span>
      <span class="area-count">${(countryFilter ? spots.filter(s=>s.county===countryFilter) : spots).length}</span>
    </button>` +
    cities.map(c => {
      const cnt = spots.filter(s => s.city === c && (!countryFilter || s.county === countryFilter)).length;
      return `<button class="area-item${abroadCityFilter === c ? ' active' : ''}" onclick="setAbroadCityFilter('${c.replace(/'/g,"\\'")}')">
        <span>${c}</span>
        ${cnt ? `<span class="area-count">${cnt}</span>` : ''}
      </button>`;
    }).join('');
}

function setCountryFilter(c) { countryFilter = c; abroadCityFilter = ''; renderAbroadFilters(); renderMain(); }
function setAbroadCityFilter(c) { abroadCityFilter = c; renderAbroadFilters(); renderMain(); }

// ── View / Search ──────────────────────────────────────────────────────────
function setView(v, btn) {
  currentView = v;
  countyFilter = '';
  document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderCountyFilters();
  renderMain();
}

function onSearch() {
  searchQuery = document.getElementById('searchBar').value;
  document.getElementById('searchClear').classList.toggle('show', searchQuery.length > 0);
  renderMain();
}

function clearSearch() {
  document.getElementById('searchBar').value = '';
  searchQuery = '';
  document.getElementById('searchClear').classList.remove('show');
  renderMain();
}

// ── Context menu ───────────────────────────────────────────────────────────
function showCtx(e, id) {
  const menu = document.getElementById('ctxMenu');
  const spot = spots.find(s => s.id === id);
  menu.innerHTML = `
    <div class="ctx-item" onclick="toggleFav('${id}');closeCtx()">
      <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="${spot?.favourited ? 'currentColor' : 'none'}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      ${spot?.favourited ? '取消最愛' : '加入最愛'}
    </div>
    <div class="ctx-item" onclick="toggleVisited('${id}');closeCtx()">
      ${SVG.check.replace('<svg', '<svg width="14" height="14" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"')}
      ${spot?.visited ? '取消已去過' : '標記已去過'}
    </div>
    <div class="ctx-item" onclick="openDetail('${id}');closeCtx()">
      ${SVG.edit.replace('<svg', '<svg width="14" height="14" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"')}
      編輯
    </div>
    <div class="ctx-item danger" onclick="deleteSpot('${id}');closeCtx()">
      ${SVG.trash.replace('<svg', '<svg width="14" height="14" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"')}
      刪除
    </div>`;
  menu.style.display = 'block';
  const x = Math.min(e.clientX, window.innerWidth - 170);
  const y = Math.min(e.clientY, window.innerHeight - 140);
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  setTimeout(() => document.addEventListener('click', closeCtx, { once: true }), 10);
}
function closeCtx() { document.getElementById('ctxMenu').style.display = 'none'; }

function toggleVisited(id) {
  const s = spots.find(x => x.id === id);
  if (s) { s.visited = !s.visited; save(); renderMain(); }
}
function toggleFav(id) {
  const s = spots.find(x => x.id === id);
  if (s) { s.favourited = !s.favourited; save(); renderMain(); }
}
function setSort(val) {
  sortOrder = val;
  renderMain();
}
function deleteSpot(id) {
  if (!confirm('確定刪除？')) return;
  spots = spots.filter(s => s.id !== id);
  idbDeletePhoto(id);
  save(); renderMain();
}

// ── Detail ─────────────────────────────────────────────────────────────────
async function openDetail(id) {
  const s = spots.find(x => x.id === id);
  if (!s) return;
  editingSpotId = id;
  detailFocalX = s.focalX ?? 0.5;
  detailFocalY = s.focalY ?? 0.5;
  detailCustomPhoto = null;
  const cats = (s.categories || []).map(cid => {
    const cat = allCats().find(c => c.id === cid);
    if (!cat) return '';
    const pc = CAT_PILL_COLORS[cat.id] || DEFAULT_PILL_COLOR;
    return `<span class="detail-pill" style="background:${pc.bg};color:${pc.color}">${cat.name}</span>`;
  }).join('');
  let picSrc = (s.photoData && s.photoData !== 'idb') ? s.photoData : (s.photoUrl || '');
  if (s.photoData === 'idb') picSrc = (await idbGetPhoto(s.id)) || picSrc;
  const hasPic = !!picSrc;
  const fx = ((detailFocalX)*100).toFixed(0), fy = ((detailFocalY)*100).toFixed(0);

  document.getElementById('detailSheet').innerHTML = `
    <div class="handle"></div>
    <button class="detail-close" onclick="closeOverlay('detailOverlay')">✕</button>
    ${hasPic ? `
      <div class="focal-wrap" id="detailFocalWrap">
        <img class="detail-img" src="${picSrc}" onerror="this.style.display='none'" id="detailFocalImg" style="height:200px;border-radius:0;margin-bottom:0;object-position:${fx}% ${fy}%">
        <div class="focal-hint">拖曳調整位置 · 儲存後生效</div>
      </div>` :
      `<div class="detail-ph">${SVG.pin.replace('<svg', '<svg width="48" height="48" stroke="var(--text3)" fill="none" stroke-width="1"')}</div>`}
    <div class="detail-title">${s.name}</div>
    ${cats ? `<div class="detail-cats">${cats}</div>` : ''}
    ${s.address ? `<div class="detail-row">${SVG.pin.replace('<svg', '<svg width="15" height="15" stroke="var(--text3)" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"')} <span>${s.address}</span></div>` : ''}
    ${(s.county || s.city) ? `<div class="detail-row">${SVG.globe.replace('<svg', '<svg width="15" height="15" stroke="var(--text3)" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"')} <span>${[s.county, s.city].filter(Boolean).join(' · ')}</span></div>` : ''}
    ${s.rating ? `<div class="detail-row">${SVG.star.replace('<svg', '<svg width="15" height="15" stroke="var(--text3)" fill="currentColor" stroke-width="1.5"')} <span>${s.rating} 分</span></div>` : ''}
    ${s.sourceUrl ? `<div class="detail-row">${SVG.link.replace('<svg', '<svg width="15" height="15" stroke="var(--text3)" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"')} <a href="${s.sourceUrl}" target="_blank">查看原始貼文</a></div>` : ''}
    ${s.note ? `<div class="detail-note">${s.note}</div>` : ''}

    ${(!s.address || (!s.photoData && !s.photoUrl)) ? `
    <div class="enrich-bar">
      <span class="enrich-hint">地址或照片資料不完整</span>
      <button class="enrich-btn" id="enrichBtn" onclick="event.stopPropagation();enrichSpot('${id}')">🔍 自動補齊</button>

async function saveDetail(id) {
  const s = spots.find(x => x.id === id);
  if (!s) return;
  s.note = document.getElementById('editNote').value.trim();
  s.sourceUrl = document.getElementById('editLink').value.trim();
  const editCounty = document.getElementById('editCounty');
  const editCity = document.getElementById('editCity');
  if (editCounty) s.county = editCounty.value.trim();
  if (editCity) s.city = editCity.value.trim();
  s.categories = [...detailSelectedCats];
  s.trips = [...detailSelectedTrips];
  const prevPhoto = { photoData: s.photoData, photoUrl: s.photoUrl, focalX: s.focalX, focalY: s.focalY };
  if (detailCustomPhoto) {
    await idbSavePhoto(s.id, detailCustomPhoto);
    s.photoData = 'idb';
    s.photoUrl = null;
    s.focalX = detailFocalX;
    s.focalY = detailFocalY;
    detailCustomPhoto = null;
  } else {
    s.focalX = detailFocalX;
    s.focalY = detailFocalY;
  }
  if (!save()) {
    Object.assign(s, prevPhoto);
    alert('⚠ 儲存失敗');
    return;
  }
  renderMain();
  closeOverlay('detailOverlay');
}

// ── Autocomplete ───────────────────────────────────────────────────────────
let acTimer = null;
let acFocusIdx = -1;
let acSuggestions = [];
let currentSessionToken = null;
let acSelected = false;

function onAcInput() {
  if (acSelected) return;
  const q = document.getElementById('addSearch').value.trim();
  clearTimeout(acTimer);
  acFocusIdx = -1;
  if (q.length < 2) { hideAc(); return; }
  acTimer = setTimeout(() => fetchAc(q), 280);
}

async function fetchAc(q) {
  const key = getKey();
  if (!key) return;
  try {
    const res = await fetch('https://places.googleapis.com/v1/places:autocomplete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Goog-Api-Key': key },
      body: JSON.stringify({ input: q, languageCode: 'zh-TW', includedPrimaryTypes: [], sessionToken: currentSessionToken })
    });
    if (!res.ok) return;
    const data = await res.json();
    // 只取 placePrediction（排除 queryPrediction）
    acSuggestions = (data.suggestions || []).filter(s => s.placePrediction);
    renderAc();
  } catch(e) {}
}

function renderAc() {
  const list = document.getElementById('acList');
  if (!acSuggestions.length) { hideAc(); return; }
  list.innerHTML = acSuggestions.slice(0, 6).map((s, i) => {
    const p = s.placePrediction;
    const main = p?.structuredFormat?.mainText?.text || p?.text?.text || '';
    const sub = p?.structuredFormat?.secondaryText?.text || '';
    return `<div class="ac-item" data-idx="${i}" onmousedown="selectAc(${i})">
      <div class="ac-item-main">${main}</div>
      ${sub ? `<div class="ac-item-sub">${sub}</div>` : ''}
    </div>`;
  }).join('');
  list.style.display = 'block';
}

function hideAc() {
  document.getElementById('acList').style.display = 'none';
  acSuggestions = [];
}

function selectAc(i) {
  const s = acSuggestions[i];
  if (!s) return;
  const p = s.placePrediction;
  const name = p?.structuredFormat?.mainText?.text || p?.text?.text || '';
  document.getElementById('addSearch').value = name;
  acSelected = true;
  hideAc();
  doSearch();
}

function onAcKey(e) {
  const list = document.getElementById('acList');
  const items = list.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acFocusIdx = Math.min(acFocusIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('focused', i === acFocusIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acFocusIdx = Math.max(acFocusIdx - 1, -1);
    items.forEach((el, i) => el.classList.toggle('focused', i === acFocusIdx));
  } else if (e.key === 'Enter') {
    if (acFocusIdx >= 0 && acSuggestions[acFocusIdx]) {
      e.preventDefault();
      selectAc(acFocusIdx);
    } else {
      hideAc();
      doSearch();
    }
  } else if (e.key === 'Escape') {
    hideAc();
  }
}

async function doSearch() {
  const q = document.getElementById('addSearch').value.trim();
  if (!q) { setAddProgress(0, '請輸入店名', true); return; }
  const key = getKey();
  if (!key) { openSettings(); return; }
  document.getElementById('addSearchBtn').disabled = true;
  document.getElementById('addResults').innerHTML = '';
  document.getElementById('addPreview').style.display = 'none';
  document.getElementById('addBtn').disabled = true;
  pendingSpot = null;
  setAddProgress(30, '🔍 搜尋中...');
  try {
    const res = await fetch('https://places.googleapis.com/v1/places:searchText', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Goog-Api-Key': key, 'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.rating,places.photos,places.googleMapsUri,places.id,places.types,places.location,places.addressComponents' },
      body: JSON.stringify({ textQuery: q, languageCode: 'zh-TW', pageSize: 5 })
    });
    if (!res.ok) throw new Error((await res.json()).error?.message || 'API 錯誤');
    const data = await res.json();
    const places = data.places || [];
    if (!places.length) { setAddProgress(0, `找不到「${q}」，試試加上城市名`, true); return; }
    setAddProgress(100, `找到 ${places.length} 個結果，請選擇`);
    window._searchResults = places;
    document.getElementById('addResults').innerHTML = places.map((p, i) => `
      <div class="result-item" onclick="selectSearchResult(${i})" data-idx="${i}">
        <div class="result-item-info">
          <div class="result-item-name">${p.displayName?.text || ''}</div>
          <div class="result-item-addr">${p.formattedAddress || ''}</div>
          ${p.rating ? `<div class="result-item-rating">★ ${p.rating}</div>` : ''}
        </div>
      </div>`).join('');
  } catch(e) {
    setAddProgress(0, '⚠ ' + e.message, true);
  } finally {
    document.getElementById('addSearchBtn').disabled = false;
  }
}

async function confirmAdd() {
  if (!pendingSpot) return;
  const btn = document.getElementById('addBtn');
  btn.disabled = true;
  const county = region === 'tw'
    ? (document.getElementById('addCounty').value || pendingSpot.county || '')
    : (document.getElementById('addCountry').value || pendingSpot.county || '');
  const city = region === 'abroad' ? document.getElementById('addCity').value.trim() : '';
  const spot = { ...pendingSpot, categories: [...addSelectedCats], county, city, trips: [...addSelectedTrips], sourceUrl: document.getElementById('addLink').value.trim(), note: document.getElementById('addNote').value.trim(), visited: false, photoData: null, focalX: 0.5, focalY: 0.5 };
  if (pendingCustomPhoto) {
    await idbSavePhoto(spot.id, pendingCustomPhoto);
    spot.photoData = 'idb';
    spot.photoUrl = null;
    spot.focalX = pendingFocalX;
    spot.focalY = pendingFocalY;
  }
  spots.unshift(spot);
  if (!save()) {
    if (spot.photoData === 'idb') idbDeletePhoto(spot.id);
    spots.shift();
    btn.disabled = false;
    setAddProgress(0, '⚠ 儲存失敗', true);
    return;
  }
  renderMain();
  closeOverlay('addOverlay');
  btn.disabled = false;
}

// ── Export / Import ────────────────────────────────────────────────────────
async function exportData() {
  const exportSpots = await Promise.all(spots.map(async s => {
    if (s.photoData !== 'idb') return s;
    const data = await idbGetPhoto(s.id);
    return { ...s, photoData: data || null };
  }));
  const blob = new Blob([JSON.stringify(exportSpots, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `myspots_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function handleImport(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async evt => {
    try {
      const imported = JSON.parse(evt.target.result);
      if (!Array.isArray(imported)) throw new Error('格式錯誤');
      const doReplace = confirm(
        `📂 檔案包含 ${imported.length} 筆資料\n\n` +
        '按「確定」→ 全部覆蓋（以此檔案為主，適合跨裝置同步）\n' +
        '按「取消」→ 只加入新資料（保留現有資料）'
      );
      const movePhotos = async arr => {
        for (const s of arr) {
          if (s.photoData && s.photoData !== 'idb') {
            await idbSavePhoto(s.id, s.photoData);
            s.photoData = 'idb';
          }
        }
      };
      if (doReplace) {
        await movePhotos(imported);
        spots = imported;
        save(); renderMain();
        alert(`✅ 已覆蓋，共 ${spots.length} 筆資料`);
      } else {
        const existingIds = new Set(spots.map(s => s.id));
        const newOnes = imported.filter(s => s.id && !existingIds.has(s.id));
        const dupes = imported.length - newOnes.length;
        await movePhotos(newOnes);
        spots = [...newOnes, ...spots];
        save(); renderMain();
        const msg = newOnes.length > 0
          ? `✅ 成功匯入 ${newOnes.length} 筆${dupes > 0 ? `，${dupes} 筆已存在略過` : ''}`
          : `所有資料已存在，無需匯入`;
        alert(msg);
      }
    } catch(err) {
      alert('❌ 匯入失敗：' + err.message);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// ── Migrate old data ───────────────────────────────────────────────────────
function migrateSpots() {
  // 嘗試從舊版 key 讀取資料並合併（v2/v3 → v4）
  const oldKeys = ['myspots_v3', 'myspots_v2', 'myspots'];
  for (const key of oldKeys) {
    const oldRaw = localStorage.getItem(key);
    if (oldRaw) {
      try {
        const oldSpots = JSON.parse(oldRaw);
        if (Array.isArray(oldSpots) && oldSpots.length > 0) {
          // 合併：只加入 v4 中不存在的 id
          const existingIds = new Set(spots.map(s => s.id));
          const newOnes = oldSpots.filter(s => s.id && !existingIds.has(s.id));
          if (newOnes.length > 0) spots = [...spots, ...newOnes];
        }
      } catch(e) {}
    }
  }

  // 欄位正規化
  let changed = false;
  let catsChanged = false;
  spots = spots.map(s => {
    const updated = { ...s };
    // 舊資料沒有 categories，用舊的 category 欄位轉換
    if (!updated.categories) {
      const map = { '餐廳': 'food', '咖啡廳': 'coffee', '民宿': 'stay', '景點': 'scene' };
      if (updated.category === '其他') {
        if (!customCats.find(c => c.id === 'other')) {
          customCats.push({ id: 'other', name: '其他', icon: 'pin' });
          catsChanged = true;
        }
        updated.categories = ['other'];
      } else {
        updated.categories = updated.category ? [map[updated.category] || 'food'] : [];
      }
      changed = true;
    }
    // 若 categories 裡有 'other' 但自訂分類沒有，自動補上
    if (updated.categories?.includes('other') && !customCats.find(c => c.id === 'other') && ![...DEFAULT_CATS_TW, ...DEFAULT_CATS_ABROAD].find(c => c.id === 'other')) {
      customCats.push({ id: 'other', name: '其他', icon: 'pin' });
      catsChanged = true;
    }
    if (updated.visited === undefined) { updated.visited = false; changed = true; }
    if (updated.county === undefined) { updated.county = ''; changed = true; }
    if (updated.lat === undefined) { updated.lat = null; changed = true; }
    if (updated.lng === undefined) { updated.lng = null; changed = true; }
    if (updated.photoData === undefined) { updated.photoData = null; changed = true; }
    if (updated.trips === undefined) { updated.trips = []; changed = true; }
    if (updated.city === undefined) { updated.city = ''; changed = true; }
    return updated;
  });
  if (catsChanged) saveCats();
  if (changed) save();
}

// 支援 ?q=店名 或 #店名 URL 參數（iOS 捷徑用）
function handleUrlQuery() {
  const fromHash = location.hash ? decodeURIComponent(location.hash.slice(1)) : '';
  const fromQuery = new URLSearchParams(location.search).get('q') || '';
  const q = (fromHash || fromQuery).trim();
  if (q && getKey()) {
    setTimeout(() => {
      openAddModal();
      setTimeout(() => {
        document.getElementById('addSearch').value = q;
        doSearch();
      }, 400);
    }, 600);
  }
}
